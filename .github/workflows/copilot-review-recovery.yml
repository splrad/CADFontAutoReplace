# 恢复 Copilot review 触发后被 GitHub Actions 审批策略拦截的 PR Governance run。
# 不要把本 workflow 设置为 required check；它只负责批准 action_required run，
# 或在唯一失败 job 是 Update Copilot Review Check 时重跑该 job。
name: Copilot Review Recovery

on:
  workflow_run:
    workflows: ["PR Governance"]
    types: [completed]

permissions:
  contents: read

jobs:
  recover-copilot-review-run:
    name: Recover Copilot Review Run
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    if: >-
      github.event.workflow_run.event == 'pull_request_review' &&
      (github.event.workflow_run.conclusion == 'action_required' || github.event.workflow_run.conclusion == 'failure') &&
      (github.event.workflow_run.actor.login == 'Copilot' || github.event.workflow_run.actor.login == 'copilot-pull-request-reviewer[bot]')
    steps:
      - name: Create actions recovery app token
        id: actions-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.WORKFLOW_AUTOMATION_APP_CLIENT_ID }}
          private-key: ${{ secrets.WORKFLOW_AUTOMATION_APP_PRIVATE_KEY }}
          permission-contents: read
          permission-pull-requests: read
          permission-actions: write

      - name: Checkout governance scripts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false
          token: ${{ steps.actions-token.outputs.token }}
          persist-credentials: false

      - name: Recover Copilot review workflow run
        env:
          GH_TOKEN: ${{ steps.actions-token.outputs.token }}
          GH_ACTIONS_TOKEN: ${{ steps.actions-token.outputs.token }}
          GH_READ_TOKEN: ${{ steps.actions-token.outputs.token }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
          PR_HEAD_REF: ${{ github.event.workflow_run.head_branch }}
          PR_BASE_REF: ${{ github.event.workflow_run.pull_requests[0].base.ref || 'main' }}
          PR_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          RECOVERY_RUN_ID: ${{ github.event.workflow_run.id }}
        run: node .github/scripts/pr-governance.js recover-copilot-review-run
