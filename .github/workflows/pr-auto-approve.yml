# GitHub Actions 页面显示的名称：彰显流程的系统化和治理感
#
# 📋 复用到新项目时的配置步骤：
#   需要在仓库中创建 TRUSTED_DEVELOPERS 变量，值为 JSON 数组格式的 GitHub 用户名列表
#   示例值：["splrad", "another-user"]
#   路径：仓库主页 → 设置 → 机密与变量（左侧边栏"安全"分类下）→ 操作 → 变量 → 新建仓库变量
#   英文路径参考：Settings → Secrets and variables → Actions → Variables → New repository variable
name: 🛡️ 核心开发审批授权

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

concurrency:
  group: auto-approve-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  privileged-access:
    # ✅ 在 PR 检查列表显示的名称
    name: 🔐 访问控制
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # 只有当 PR 作者在受信任开发者列表中，并且 PR 的目标分支是默认分支时，才执行审批流程
    if: >-
      contains(fromJSON(vars.TRUSTED_DEVELOPERS), github.actor) &&
      github.event.pull_request.base.ref == github.event.repository.default_branch
    permissions:
      pull-requests: write

    steps:
      - name: 🧩 触发核心开发者准入判定
        uses: hmarr/auto-approve-action@f0939ea97e9205ef24d872e76833fa908a770363 # v4.0.0
        with:
          # ❗ 关键：这里必须使用内置 token，代表“机器人”审批“你”的 PR
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # 机器人留下的评论：采用“协议响应”式的措辞
          review-message: "🤖 已完成核心开发者身份校验，自动准入流程已授权。"