# 📋 复用到新项目时的配置步骤：
#   1) 创建仓库 Variable（路径：Settings → Secrets and variables → Actions → Variables → New repository variable）
#      - TRUSTED_DEVELOPERS：JSON 数组格式的 GitHub 用户名白名单
#      - 示例值：["splrad", "another-user"]
#   2) 行为说明：
#      - PR 作者在 TRUSTED_DEVELOPERS 中：自动提交 APPROVE
#      - 自动授权成功后仅提交 APPROVE；评论与通知由 merge-permission.yml 统一回写
#      - 不在名单中：跳过自动审批，等待后续规则校验或人工审批
#   3) 验证建议：分别用白名单用户和非白名单用户各触发一次 PR 事件
name: 🛡️ 合并审批自动授权

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

concurrency:
  group: auto-approve-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  privileged-access:
    # ✅ 在 PR 检查列表显示的名称
    name: 🔐 核心成员类别
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # 只有当 PR 作者在核心开发者列表中时，执行自动审批（覆盖 feature→test 和 test→main 两层 PR）
    if: >-
      contains(fromJSON(vars.TRUSTED_DEVELOPERS), github.actor)
    permissions:
      pull-requests: write

    steps:
      - name: 🧩 触发核心开发者准入判定
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews" \
            -f event='APPROVE'

  # 非核心开发者时保留可见检查结果，避免 PR 列表只有灰色 Skipped
  access-denied:
    name: 🔐 普通成员类别
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      !contains(fromJSON(vars.TRUSTED_DEVELOPERS), github.actor)
    permissions:
      contents: read

    steps:
      - name: ℹ️ 记录非核心成员路径
        run: |
          echo "提交者不在核心开发者名单中，已跳过自动审批。"
          echo "评论与通知由 merge-permission.yml 统一处理。"