# 📋 复用到新项目时的配置步骤：
#   1) 创建仓库 Variable（路径：Settings → Secrets and variables → Actions → Variables → New repository variable）
#      - TRUSTED_DEVELOPERS：JSON 数组格式的 GitHub 用户名白名单
#      - 示例值：["splrad", "another-user"]
#   2) 行为说明：
#      - PR 作者在 TRUSTED_DEVELOPERS 中：自动提交 APPROVE
#      - 自动授权成功后提交带说明正文的 APPROVE（不新增 PR 评论）
#      - 自动审批邮件使用专用模板，明确区别于 merge-permission.yml 的权限校验通知
#      - 状态评论与通知仍由 merge-permission.yml 统一回写
#      - 不在名单中：跳过自动审批，等待后续规则校验或人工审批
#   3) 验证建议：分别用白名单用户和非白名单用户各触发一次 PR 事件
name: 🛡️ 合并审批自动授权

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

concurrency:
  group: auto-approve-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  privileged-access:
    # ✅ 在 PR 检查列表显示的名称
    name: 🔐 核心成员类别
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # 只有当 PR 作者在核心开发者列表中时，执行自动审批（覆盖 feature→test 和 test→main 两层 PR）
    if: >-
      contains(fromJSON(vars.TRUSTED_DEVELOPERS), github.actor)
    permissions:
      pull-requests: write

    steps:
      - name: 🧩 触发核心开发者准入判定
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          REVIEW_BODY=$(cat <<EOF
          🤖【自动审批】已完成
          🚀 核心成员审批已自动提交（APPROVE）

          - PR: #$PR_NUMBER
          - 动作类型: 自动提交 APPROVE
          - 分支流向: $HEAD_REF -> $BASE_REF
          - 提交人: $PR_AUTHOR
          - 执行动作: event=APPROVE

          > 本审批由 **GitHub Actions** 自动完成。
          EOF
          )

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "repos/${{ github.repository }}/pulls/${PR_NUMBER}/reviews" \
            -f event='APPROVE' \
            -f body="$REVIEW_BODY"

  # 非核心开发者时保留可见检查结果，避免 PR 列表只有灰色 Skipped
  access-denied:
    name: 🔐 普通成员类别
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      !contains(fromJSON(vars.TRUSTED_DEVELOPERS), github.actor)
    permissions:
      contents: read

    steps:
      - name: ℹ️ 记录非核心成员路径
        run: |
          echo "提交者不在核心开发者名单中，已跳过自动审批。"
          echo "评论与通知由 merge-permission.yml 统一处理。"