# CodeQL 参与 ruleset required checks：
# - Analyze C# / Analyze JavaScript 阻断构建、提取或分析失败。
# - CodeQL 是 GitHub Advanced Security 生成的 code scanning 结果检查，
#   高严重度 alert 按 GitHub 默认策略阻断合并。
# CodeQL alert 反馈使用 GitHub 官方 PR annotation、Files changed 标注和 Security / Code scanning 页面。
name: CodeQL

on:
  pull_request:
    branches:
      - main
      - test
  push:
    branches:
      - main
      - test
  schedule:
    - cron: '28 20 * * 0'
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze-csharp:
    name: Analyze C#
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp
          build-mode: manual

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Build solution for CodeQL
        shell: pwsh
        run: dotnet build CADFontAutoReplace.slnx -c Release --nologo

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4

  analyze-javascript:
    name: Analyze JavaScript
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
