# 📋 复用到新项目时的配置步骤：
#   0. （可选）创建 REPO_ADMIN_TOKEN（或 MY_PAT）用于读取 API 的回退访问；评论写入不会回退到该令牌
#   1. 确保仓库已创建 TRUSTED_DEVELOPERS 变量（JSON 数组格式的用户名列表）
#   2. 修改下方 on.pull_request_target.branches 为实际主分支名（main 或 master）
#   3. 当 PR 关闭时自动发布状态评论，并通过评论中的 @对象触发 GitHub 官方通知邮件
#   4. 若日志出现 github.token 无写权限，先确认仓库 Actions 默认权限为 Read and write，再确认本工作流 jobs.permissions 含 pull-requests: write 与 issues: write
name: 📣 PR关闭状态通知

on:
  pull_request_target:
    branches:
      - main
    types: [closed]

concurrency:
  group: pr-close-notify-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  notify-pr-close-status:
    # ✅ 在 PR 检查列表显示的名称
    name: 📣 发布PR关闭状态通知
    runs-on: ubuntu-latest
    timeout-minutes: 3

    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: 📣 按关闭状态发送评论并 @ 通知对象
        env:
          GH_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN || secrets.MY_PAT || github.token }}
          GH_COMMENT_TOKEN: ${{ github.token }}
          TRUSTED_DEVELOPERS: ${{ vars.TRUSTED_DEVELOPERS }}
          ISSUE_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          SOURCE_BRANCH: ${{ github.event.pull_request.head.ref }}
          TARGET_BRANCH: ${{ github.event.pull_request.base.ref }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_CLOSED_BY: ${{ github.event.sender.login }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          MERGED_BY: ${{ github.event.pull_request.merged_by.login }}
          MERGE_COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          REPO: ${{ github.repository }}
        run: |
          marker='<!-- pr-close-status-notice -->'
          RUN_GH_API_LAST_LABEL=''
          RUN_GH_API_USED_FALLBACK='false'

          issue_number="${ISSUE_NUMBER:-0}"
          if [ "$issue_number" = "0" ]; then
            echo "未获取到 PR 编号，跳过通知。"
            exit 0
          fi

          run_gh_api() {
            local purpose="$1"
            local order="${2:-comment-first}"
            shift 2

            local err_file="$RUNNER_TEMP/pr_close_notify_gh_err.log"
            local tried_any="false"
            local used_fallback="false"
            local labels=()

            if [ "$order" = "api-first" ]; then
              labels=(api comment)
            elif [ "$order" = "api-only" ]; then
              labels=(api)
            elif [ "$order" = "comment-only" ]; then
              labels=(comment)
            else
              labels=(comment api)
            fi

            for label in "${labels[@]}"; do
              local token=""
              if [ "$label" = "comment" ]; then
                token="${GH_COMMENT_TOKEN:-}"
              else
                token="${GH_TOKEN:-}"
                if [ -n "${GH_COMMENT_TOKEN:-}" ] && [ "$token" = "$GH_COMMENT_TOKEN" ]; then
                  continue
                fi
              fi

              [ -z "$token" ] && continue

              tried_any="true"
              if GH_TOKEN="$token" gh api "$@" 2>"$err_file"; then
                RUN_GH_API_LAST_LABEL="$label"
                RUN_GH_API_USED_FALLBACK="$used_fallback"
                if [ "$used_fallback" = "true" ]; then
                  echo "[$purpose] 已使用备用令牌执行成功。" >&2
                fi
                return 0
              fi

              if grep -q "Resource not accessible by integration" "$err_file"; then
                if [ "$order" = "comment-only" ]; then
                  echo "::error::[$purpose] github.token 无写权限，无法由机器人发布评论。请检查仓库 Actions 默认权限（Read and write）及当前工作流 jobs.permissions 是否包含 pull-requests: write 与 issues: write。" >&2
                  cat "$err_file" >&2
                  return 1
                fi
                echo "[$purpose] 当前令牌权限受限，尝试备用令牌..." >&2
                used_fallback="true"
                continue
              fi

              cat "$err_file" >&2
              return 1
            done

            if [ "$tried_any" != "true" ]; then
              echo "[$purpose] 未配置可用令牌，无法调用 gh api。" >&2
              return 1
            fi

            [ -f "$err_file" ] && cat "$err_file" >&2
            return 1
          }

          trusted_json=$(printf '%s' "${TRUSTED_DEVELOPERS:-[]}" | jq -c 'if type == "array" then map(select(type == "string" and length > 0)) else [] end' 2>/dev/null || echo '[]')
          mention_text=$(echo "$trusted_json" | jq -r 'unique | map("@" + .) | join(" ")')
          [ -z "$mention_text" ] && mention_text='（未配置通知对象）'

          comments_json=$(run_gh_api "读取关闭状态评论" "api-first" --method GET \
            -H "Accept: application/vnd.github+json" \
            "repos/$REPO/issues/$issue_number/comments" \
            -f per_page=100)

          existing_id=$(echo "$comments_json" | jq -r --arg marker "$marker" '.[] | select((.body // "") | contains($marker)) | .id' | head -n 1)

          pr_title="${PR_TITLE:-unknown}"
          source_branch="${SOURCE_BRANCH:-unknown}"
          target_branch="${TARGET_BRANCH:-unknown}"
          pr_author="${PR_AUTHOR:-unknown}"
          pr_closed_by="${PR_CLOSED_BY:-unknown}"
          merged_by="${MERGED_BY:-unknown}"
          merge_commit_sha="${MERGE_COMMIT_SHA:-N/A}"

          body_file="$RUNNER_TEMP/pr_close_status_notice_body.txt"

          {
            echo "$marker"

            if [ "${PR_MERGED}" = "true" ]; then
              echo '## ✅ PR 合并成功并关闭'
            else
              echo '## ⚠️ PR 未合并但已关闭'
            fi

            echo
            echo "- PR: #$issue_number"
            echo "- 标题: $pr_title"
            echo "- 分支流向: $source_branch → $target_branch"
            echo "- 提交人: $pr_author"

            if [ "${PR_MERGED}" = "true" ]; then
              echo "- 关闭原因: 已成功合并"
              echo "- 合并人: $merged_by"
              echo "- 合并提交: $merge_commit_sha"
            else
              echo "- 关闭原因: 未合并直接关闭"
              echo "- 关闭人: $pr_closed_by"
            fi

            echo "- 通知对象：$mention_text"
            echo
            echo '> 本通知由 **GitHub Actions** 自动发布。'
          } > "$body_file"

          body=$(cat "$body_file")

          if [ -n "$existing_id" ] && [ "$existing_id" != "null" ]; then
            run_gh_api "更新关闭状态评论" "comment-only" --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "repos/$REPO/issues/comments/$existing_id" \
              -f body="$body" >/dev/null
            echo "已更新 PR #$issue_number 的关闭状态通知评论。"
          else
            run_gh_api "创建关闭状态评论" "comment-only" --method POST \
              -H "Accept: application/vnd.github+json" \
              "repos/$REPO/issues/$issue_number/comments" \
              -f body="$body" >/dev/null
            echo "已创建 PR #$issue_number 的关闭状态通知评论。"
          fi

          echo "关闭状态评论已由 GH_COMMENT_TOKEN 发布（机器人身份）。"
