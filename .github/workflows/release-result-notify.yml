# 📋 复用到新项目时的配置步骤：
#   0. （可选）创建 REPO_ADMIN_TOKEN（或 MY_PAT）用于读取 API，并在 github.token 无法评论时作为备用令牌
#   1. 调用方需传入 Release job 的输出、当前提交 SHA、运行编号和触发人等上下文
#   2. 评论默认优先使用 github.token 以保持机器人身份；若当前上下文受限且配置了备用令牌，会再尝试一次备用令牌
#   3. 若所有评论令牌都因集成权限受限而失败，仅输出 warning，不阻断正式 Release
name: 📣 Release结果通知

on:
  workflow_call:
    inputs:
      gh_repo:
        required: true
        type: string
      trusted_list:
        required: false
        type: string
      release_result:
        required: true
        type: string
      merged_pr_number:
        required: false
        type: string
      merged_pr_title:
        required: false
        type: string
      display_version:
        required: false
        type: string
      build_id:
        required: false
        type: string
      tag_name:
        required: false
        type: string
      release_title:
        required: false
        type: string
      should_release:
        required: false
        type: string
      github_sha:
        required: true
        type: string
      github_ref_name:
        required: true
        type: string
      github_actor:
        required: true
        type: string
      source_run_id:
        required: true
        type: string
      source_run_attempt:
        required: true
        type: string
    secrets:
      REPO_ADMIN_TOKEN:
        required: false
      MY_PAT:
        required: false

concurrency:
  group: release-result-notify-${{ inputs.gh_repo }}-${{ inputs.source_run_id }}-${{ inputs.source_run_attempt }}
  cancel-in-progress: false

jobs:
  notify-release-result:
    name: 📣 向核心开发者发送发布结果提醒
    runs-on: windows-latest
    timeout-minutes: 10

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: 📣 向核心开发者发送发布结果提醒
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN || secrets.MY_PAT || github.token }}
          GH_COMMENT_TOKEN: ${{ github.token }}
          GH_REPO: ${{ inputs.gh_repo }}
          TRUSTED_LIST: ${{ inputs.trusted_list }}
          RELEASE_RESULT: ${{ inputs.release_result }}
          MERGED_PR_NUMBER: ${{ inputs.merged_pr_number }}
          MERGED_PR_TITLE: ${{ inputs.merged_pr_title }}
          DISPLAY_VERSION: ${{ inputs.display_version }}
          BUILD_ID: ${{ inputs.build_id }}
          TAG_NAME: ${{ inputs.tag_name }}
          RELEASE_TITLE: ${{ inputs.release_title }}
          SHOULD_RELEASE: ${{ inputs.should_release }}
          GITHUB_SHA_OVERRIDE: ${{ inputs.github_sha }}
          GITHUB_REF_NAME_OVERRIDE: ${{ inputs.github_ref_name }}
          GITHUB_ACTOR_OVERRIDE: ${{ inputs.github_actor }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
          SOURCE_RUN_ATTEMPT: ${{ inputs.source_run_attempt }}
        run: |
          $headers = @{
              Accept = 'application/vnd.github+json'
              Authorization = "Bearer $env:GH_TOKEN"
              'X-GitHub-Api-Version' = '2022-11-28'
          }

          function Resolve-VersionInfo {
              $resolvedDisplayVersion = [string]$env:DISPLAY_VERSION
              $resolvedBuildId = [string]$env:BUILD_ID
              $resolvedTagName = [string]$env:TAG_NAME
              $resolvedReleaseTitle = [string]$env:RELEASE_TITLE

              if (
                  -not [string]::IsNullOrWhiteSpace($resolvedDisplayVersion) -and
                  -not [string]::IsNullOrWhiteSpace($resolvedBuildId) -and
                  -not [string]::IsNullOrWhiteSpace($resolvedTagName) -and
                  -not [string]::IsNullOrWhiteSpace($resolvedReleaseTitle)
              ) {
                  return [pscustomobject]@{
                      DisplayVersion = $resolvedDisplayVersion
                      BuildId = $resolvedBuildId
                      TagName = $resolvedTagName
                      ReleaseTitle = $resolvedReleaseTitle
                  }
              }

              $versionResponse = Invoke-WebRequest `
                  -Uri "https://api.github.com/repos/$env:GH_REPO/contents/Version.props?ref=$env:GITHUB_SHA_OVERRIDE" `
                  -Headers $headers `
                  -SkipHttpErrorCheck

              if ($versionResponse.StatusCode -ne 200) {
                  return [pscustomobject]@{
                      DisplayVersion = $resolvedDisplayVersion
                      BuildId = $resolvedBuildId
                      TagName = $resolvedTagName
                      ReleaseTitle = $resolvedReleaseTitle
                  }
              }

              $versionPayload = $versionResponse.Content | ConvertFrom-Json
              $encodedContent = [string]$versionPayload.content
              if ([string]::IsNullOrWhiteSpace($encodedContent)) {
                  return [pscustomobject]@{
                      DisplayVersion = $resolvedDisplayVersion
                      BuildId = $resolvedBuildId
                      TagName = $resolvedTagName
                      ReleaseTitle = $resolvedReleaseTitle
                  }
              }

              $versionContent = [System.Text.Encoding]::UTF8.GetString(
                  [System.Convert]::FromBase64String(($encodedContent -replace '\s', ''))
              )
              [xml]$versionXml = $versionContent

              $resolvedDisplayVersion = [string]$versionXml.Project.PropertyGroup.PluginDisplayVersion
              $resolvedBuildId = [string]$versionXml.Project.PropertyGroup.PluginBuildId
              if (-not [string]::IsNullOrWhiteSpace($resolvedDisplayVersion)) {
                  $resolvedTagName = "v$resolvedDisplayVersion"
              }
              if (
                  -not [string]::IsNullOrWhiteSpace($resolvedDisplayVersion) -and
                  -not [string]::IsNullOrWhiteSpace($resolvedBuildId)
              ) {
                  $resolvedReleaseTitle = "AFR v$resolvedDisplayVersion ($resolvedBuildId)"
              }

              return [pscustomobject]@{
                  DisplayVersion = $resolvedDisplayVersion
                  BuildId = $resolvedBuildId
                  TagName = $resolvedTagName
                  ReleaseTitle = $resolvedReleaseTitle
              }
          }

          function Resolve-MergedPullRequest {
              $resolvedPrNumber = [string]$env:MERGED_PR_NUMBER
              $resolvedPrTitle = [string]$env:MERGED_PR_TITLE
              if ([string]::IsNullOrWhiteSpace($resolvedPrNumber)) {
                  return $null
              }

              return [pscustomobject]@{
                  Number = $resolvedPrNumber
                  Title = $resolvedPrTitle
              }
          }

          function Invoke-ReleaseResultComment {
              param(
                  [string]$PrNumber,
                  [string]$PayloadPath
              )

              $primaryToken = [string]$env:GH_COMMENT_TOKEN
              $fallbackToken = [string]$env:GH_TOKEN
              $originalToken = [string]$env:GH_TOKEN
              $tokenCandidates = [System.Collections.Generic.List[object]]::new()
              $permissionErrors = [System.Collections.Generic.List[string]]::new()

              if (-not [string]::IsNullOrWhiteSpace($primaryToken)) {
                  $tokenCandidates.Add([pscustomobject]@{
                      Label = 'github.token'
                      Token = $primaryToken
                  })
              }

              if (
                  -not [string]::IsNullOrWhiteSpace($fallbackToken) -and
                  $fallbackToken -ne $primaryToken
              ) {
                  $tokenCandidates.Add([pscustomobject]@{
                      Label = '备用令牌'
                      Token = $fallbackToken
                  })
              }

              if ($tokenCandidates.Count -eq 0) {
                  throw '未配置可用于发布 Release 结果评论的令牌。'
              }

              foreach ($candidate in $tokenCandidates) {
                  $env:GH_TOKEN = [string]$candidate.Token
                  $commentOutput = @(gh api --method POST "repos/$env:GH_REPO/issues/$PrNumber/comments" --input $PayloadPath 2>&1)
                  $commentExitCode = $LASTEXITCODE
                  if ($commentExitCode -eq 0) {
                      if ([string]$candidate.Label -ne 'github.token') {
                          Write-Host '::warning::发布结果评论已通过备用令牌发布，显示身份可能不是 GitHub Actions 机器人。'
                      }

                      $env:GH_TOKEN = $originalToken
                      $global:LASTEXITCODE = 0
                      return $true
                  }

                  $commentOutputText = [string](($commentOutput | Out-String).Trim())
                  if ($commentOutputText -match 'Resource not accessible by integration') {
                      $permissionErrors.Add("[$([string]$candidate.Label)] $commentOutputText")
                      $global:LASTEXITCODE = 0
                      continue
                  }

                  $env:GH_TOKEN = $originalToken
                  throw "向 PR #$PrNumber 发布结果评论失败。`n$commentOutputText"
              }

              $env:GH_TOKEN = $originalToken
              Write-Host '::warning::当前上下文无权限写入 PR 评论，已跳过发布结果通知。请检查仓库 Actions 默认权限是否为 Read and write，并确认当前工作流包含 pull-requests: write 与 issues: write。'
              foreach ($permissionError in $permissionErrors) {
                  if (-not [string]::IsNullOrWhiteSpace($permissionError)) {
                      Write-Host $permissionError
                  }
              }

              $global:LASTEXITCODE = 0
              return $false
          }

          $trustedUsers = @()
          if (-not [string]::IsNullOrWhiteSpace($env:TRUSTED_LIST)) {
              try {
                  $parsedTrustedList = $env:TRUSTED_LIST | ConvertFrom-Json
                  foreach ($user in @($parsedTrustedList)) {
                      if ($user -is [string] -and -not [string]::IsNullOrWhiteSpace($user)) {
                          $trustedUsers += $user.Trim()
                      }
                  }
              } catch {
                  Write-Host "::warning::TRUSTED_DEVELOPERS 解析失败：$($_.Exception.Message)"
              }
          }

          $trustedUsers = @($trustedUsers | Select-Object -Unique)
          $actor = [string]$env:GITHUB_ACTOR_OVERRIDE
          $mentionUsers = @($trustedUsers | ForEach-Object { "@$_" })
          if (-not [string]::IsNullOrWhiteSpace($actor) -and -not ($trustedUsers -contains $actor)) {
              $mentionUsers += "@$actor"
          }

          $mentionDisplay = if ($mentionUsers.Count -gt 0) {
              [string]::Join('；', $mentionUsers)
          } else {
              '（未配置通知对象）'
          }

          $versionInfo = Resolve-VersionInfo
          $tagName = if ([string]::IsNullOrWhiteSpace($versionInfo.TagName)) { '未读取到' } else { $versionInfo.TagName }
          $releaseTitle = if ([string]::IsNullOrWhiteSpace($versionInfo.ReleaseTitle)) { '未读取到' } else { $versionInfo.ReleaseTitle }

          if ($env:SHOULD_RELEASE -eq 'false') {
              Write-Host '当前运行未检测到新版本号变化，跳过发布结果通知。'
              exit 0
          }

          if ([string]::IsNullOrWhiteSpace($env:SHOULD_RELEASE)) {
              if ($tagName -eq '未读取到') {
                  Write-Host '::warning::无法判断当前运行是否对应版本号变化，跳过发布结果通知。'
                  exit 0
              }

              $releaseLookup = Invoke-WebRequest `
                  -Uri "https://api.github.com/repos/$env:GH_REPO/releases/tags/$tagName" `
                  -Headers $headers `
                  -SkipHttpErrorCheck

              if ($releaseLookup.StatusCode -eq 200) {
                  Write-Host '当前版本已存在 Release，本次运行不对应新的版本号变化，跳过发布结果通知。'
                  exit 0
              }

              if ($releaseLookup.StatusCode -ne 404) {
                  throw "查询 Release $tagName 失败，HTTP $($releaseLookup.StatusCode)。"
              }
          }

          $pullRequestInfo = Resolve-MergedPullRequest
          if ($null -eq $pullRequestInfo -or [string]::IsNullOrWhiteSpace([string]$pullRequestInfo.Number)) {
              Write-Host '::warning::未找到本次版本号变化对应的已合并且已关闭 PR，跳过发布结果通知。'
              exit 0
          }

          $prNumber = [string]$pullRequestInfo.Number
          $prTitle = if ([string]::IsNullOrWhiteSpace([string]$pullRequestInfo.Title)) { '未读取到' } else { [string]$pullRequestInfo.Title }
          $prUrl = "[https://github.com/$env:GH_REPO/pull/$prNumber](https://github.com/$env:GH_REPO/pull/$prNumber)"
          $releaseUrl = if ($tagName -eq '未读取到') { '未生成' } else { "[https://github.com/$env:GH_REPO/releases/tag/$tagName](https://github.com/$env:GH_REPO/releases/tag/$tagName)" }
          $commitShortSha = ([string]$env:GITHUB_SHA_OVERRIDE).Substring(0, 7)
          $runUrl = "[https://github.com/$env:GH_REPO/actions/runs/$env:SOURCE_RUN_ID/attempts/$env:SOURCE_RUN_ATTEMPT](https://github.com/$env:GH_REPO/actions/runs/$env:SOURCE_RUN_ID/attempts/$env:SOURCE_RUN_ATTEMPT)"

          if ($env:RELEASE_RESULT -eq 'success') {
              $title = '## 📦【版本发布】已完成'
              $resultText = 'Release 创建成功'
          } else {
              $title = '## 📦【版本发布】未完成'
              $resultText = 'Release 创建失败'
          }

          $commentBody = @(
              "<!-- release-build-status-notice:$env:SOURCE_RUN_ID:$env:SOURCE_RUN_ATTEMPT -->",
              $title,
              '',
              "- 运行结果：**$resultText**",
              "- PR链接：$prUrl",
              "- PR标题：**$prTitle**",
              "- 版本标签：**$tagName**",
              "- 发布标题：**$releaseTitle**",
              "- 目标分支：**$env:GITHUB_REF_NAME_OVERRIDE**",
              "- 提交：**$commitShortSha**",
              "- 触发人：**$actor**",
              "- 工作流运行：$runUrl",
              "- Release 链接：$releaseUrl",
              "- 通知对象：$mentionDisplay",
              '',
              '> 本通知由 **GitHub Actions** 自动发布。'
          ) -join "`n"

          $payload = @{ body = $commentBody } | ConvertTo-Json -Compress
          $payloadPath = Join-Path $env:RUNNER_TEMP "release-build-notice-$env:SOURCE_RUN_ID-$env:SOURCE_RUN_ATTEMPT.json"
          $payload | Set-Content -LiteralPath $payloadPath -Encoding utf8
          Invoke-ReleaseResultComment -PrNumber $prNumber -PayloadPath $payloadPath | Out-Null