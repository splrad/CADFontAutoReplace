name: "Project Nexus: 分支生命周期重置协议"

on:
  push:
    branches:
      - master

jobs:
  sync-back:
    name: "🔄 生产环境状态回拨 (master ➔ test)"
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: "📦 镜像环境全量检出"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "🔄 执行强制同步逻辑"
        run: |
          git config user.name "nexus-bot"
          git config user.email "nexus-bot@github.com"

          echo "📡 同步远程状态..."
          git fetch githup

          echo "🔍 检查远程 test 分支是否存在..."
          if git ls-remote --exit-code --heads github test; then
            echo "✔ test 分支存在，基于远程检出"
            git checkout -B test github/test
          else
            echo "⚠ test 分支不存在，创建新分支"
            git checkout -B test github/master
          fi

          echo "🔄 执行状态回拨..."
          git reset --hard github/master

          echo "🚀 强制同步到远程..."
          git push github test --force
          echo "✅ 同步完成！"
