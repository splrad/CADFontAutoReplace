# 📋 复用到新项目时的配置步骤：
#   1. 在仓库中创建以下 Secrets（路径：设置 → 机密与变量 → 操作 → 新建仓库机密）：
#      - MY_PAT：GitHub 个人访问令牌（需要 repo 权限）
#   2. 如需保护更多长期分支不被自动归位，修改 PROTECTED_BRANCHES
#   3. 该流程用于解决“复用同一来源分支时，后续 PR 合并信息累计历史 commits”的问题
name: ♻️ 合并后来源分支归位

on:
  pull_request_target:
    types: [closed]

concurrency:
  group: reset-source-branch-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  PROTECTED_BRANCHES: '["main","test"]'

jobs:
  reset-source-branch:
    # ✅ 在 PR 检查列表显示的名称
    name: ♻️ 清理来源分支历史
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref != github.event.pull_request.base.ref

    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: 🔁 将来源分支归位到目标分支最新提交
        env:
          GH_TOKEN: ${{ secrets.MY_PAT }}
          REPO: ${{ github.repository }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          PROTECTED_BRANCHES_JSON: ${{ env.PROTECTED_BRANCHES }}
        run: |
          set -euo pipefail

          IS_PROTECTED=$(echo "$PROTECTED_BRANCHES_JSON" | jq -r --arg branch "$HEAD_BRANCH" 'if index($branch) then "true" else "false" end')
          if [ "$IS_PROTECTED" = "true" ]; then
            echo "⏭️ $HEAD_BRANCH 属于受保护分支，跳过自动归位。"
            exit 0
          fi

          ENCODED_BASE_BRANCH=$(jq -rn --arg v "$BASE_BRANCH" '$v|@uri')
          ENCODED_HEAD_BRANCH=$(jq -rn --arg v "$HEAD_BRANCH" '$v|@uri')

          HEAD_REF=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/$REPO/git/ref/heads/$ENCODED_HEAD_BRANCH" \
            --jq '.ref' \
            2>/dev/null || true)

          if [ -z "$HEAD_REF" ]; then
            echo "⏭️ 来源分支 $HEAD_BRANCH 已被自动删除，跳过归位（无需处理）。"
            exit 0
          fi

          BASE_SHA=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/$REPO/git/ref/heads/$ENCODED_BASE_BRANCH" \
            --jq '.object.sha')

          echo "📌 目标分支: $BASE_BRANCH @ $BASE_SHA"
          echo "📌 来源分支: $HEAD_BRANCH"

          gh api --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "repos/$REPO/git/refs/heads/$ENCODED_HEAD_BRANCH" \
            -f sha="$BASE_SHA" \
            -F force=true

          echo "✅ 已将 $HEAD_BRANCH 归位到 $BASE_BRANCH 最新提交。"
