name: 🛡️ PR检查

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted, dismissed]

concurrency:
  group: orchestrate-pr-events-${{ github.event.pull_request.number || github.run_id }}
  # 解决冲突后可能同时出现 synchronize 与 review dismissed，排队执行可避免自动审批被互相取消。
  cancel-in-progress: false

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  auto-approve:
    name: 🧩 审批分类
    if: github.event_name == 'pull_request_target'
    uses: ./.github/workflows/pr-auto-approve.yml
    secrets: inherit

  merge-permission:
    name: 🧩 权限审查
    needs: auto-approve
    if: >-
      always() &&
      (github.event_name == 'pull_request_target' || github.event_name == 'pull_request_review')
    uses: ./.github/workflows/merge-permission.yml
    secrets: inherit

  branch-policy-check:
    name: 🧩 主干准入
    needs: merge-permission
    if: >-
      always() &&
      github.event_name == 'pull_request_target' &&
      github.event.pull_request.base.ref == 'main'
    uses: ./.github/workflows/branch-policy-check.yml
    secrets: inherit