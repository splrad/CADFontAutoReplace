# 📋 复用到新项目时的配置步骤：
#   1) 在仓库 Variables 中配置 TRUSTED_DEVELOPERS，格式为 JSON 数组：
#      ["your-login", "another-login"]。
#      该名单用于自动 APPROVE 和 main 授权门禁。
#   2) 内置 GITHUB_TOKEN 只保留 contents: read。
#      PR 审查、评论、Copilot request 和 Checks API 写操作均使用下面的 GitHub App token。
#   3) 配置 PR Automation 复用的 GitHub App：
#      - WORKFLOW_AUTOMATION_APP_CLIENT_ID
#      - WORKFLOW_AUTOMATION_APP_PRIVATE_KEY
#      该 App 必须安装到本仓库，并建议授予仓库权限：
#      Contents: Read and write；Pull requests: Read and write；
#      Issues: Read and write；Checks: Read and write。
#      本 workflow 用该 App 的短期 installation token 请求 GitHub Copilot Code Review，
#      并维护 Copilot Code Review Gate 自定义 check run。
#   4) 分支保护 / ruleset 的 required checks 建议配置为：
#      - main: PR Governance / Main Authorization Gate，source 保持 GitHub Actions。
#      - main: Copilot Code Review Gate，source 必须选本 GitHub App 或 Any source；
#        该 check run 由 GitHub App installation token 通过 Checks API 创建，不属于 GitHub Actions job。
#      CodeQL 使用 GitHub Advanced Security default setup 和 ruleset 的
#      Require code scanning results 管理，不再维护本仓库自定义 CodeQL workflow。
#      不要把 Auto Approve 或 Update Copilot Review Check 设置为 required check。
#   5) Copilot Code Review Gate 只检查 main 目标 PR。
#      本 workflow 会通过 REST API 显式请求 Copilot Code Review；ruleset 自动审查仍可兜底人工 PR。
#      重要：GitHub 会静默忽略 GitHub App installation token 发起的 Copilot review request
#      （API 返回成功但不产生 review_requested 事件），且 ruleset 自动审查不覆盖 bot 创建的 PR。
#      因此必须配置仓库 secret COPILOT_REVIEW_REQUEST_TOKEN：
#      一个拥有 Copilot 订阅的用户的 fine-grained PAT，仓库权限 Pull requests: Read and write。
#      未配置该 secret 时会回退 App token，请求大概率被静默忽略并导致该 job 失败提示。
#      它依赖 .github/copilot-instructions.md
#      要求 Copilot 审查正文主体使用简体中文，并在 comment 第一行标注：
#      - 严重程度：阻断 / Severity: blocking
#      - 严重程度：建议 / Severity: suggestion
#      该严重程度是本仓库自定义协议，不是 Copilot 官方结构化字段，也不依赖 Low/Medium 等 UI 徽标。
#   6) 如果 GitHub App 创建 PR 导致 PR 作者显示为 bot，PR Automation 会在 PR 正文写入
#      workflow:source-actor 隐藏标记；本 workflow 会按该原始推送人判断 TRUSTED_DEVELOPERS。
name: PR Governance

on:
  # pull_request_target 允许在受保护的默认分支上下文中读取治理脚本、提交审批和失败通知。
  # 脚本 checkout 固定到 base.sha，避免执行来自 PR head 的不可信 workflow 脚本。
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  # 审批或 Copilot review 正文变化后重新计算 main 授权门禁和 Copilot Code Review Gate。
  pull_request_review:
    types: [submitted, edited, dismissed]
  # Copilot inline comment 变化后重新计算 Copilot Code Review Gate。
  pull_request_review_comment:
    types: [created, edited, deleted]

concurrency:
  group: pr-governance-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  # 以下 PR 上下文供 .github/scripts/pr-governance.js 使用。
  PR_NUMBER: ${{ github.event.pull_request.number }}
  PR_AUTHOR: ${{ github.event.pull_request.user.login }}
  PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
  PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
  PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
  TRUSTED_DEVELOPERS: ${{ vars.TRUSTED_DEVELOPERS || '[]' }}

jobs:
  request-copilot-review:
    name: Request Copilot Review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    # ruleset 自动审查对 GitHub App / bot 作者不可靠；这里显式请求官方 Copilot reviewer。
    # 该 job 不作为 required check；Copilot Code Review Gate 自定义 check run 负责最终阻断。
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.pull_request.base.ref == 'main'
    steps:
      - name: Create Copilot review app token
        id: copilot-review-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.WORKFLOW_AUTOMATION_APP_CLIENT_ID }}
          private-key: ${{ secrets.WORKFLOW_AUTOMATION_APP_PRIVATE_KEY }}
          permission-contents: read
          permission-issues: read
          permission-pull-requests: write

      - name: Checkout governance scripts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false
          token: ${{ steps.copilot-review-token.outputs.token }}
          persist-credentials: false

      - name: Request Copilot code review
        env:
          # GitHub 会静默忽略 App token 的 Copilot review request；
          # 优先使用有 Copilot 订阅的用户 PAT（COPILOT_REVIEW_REQUEST_TOKEN），无则回退 App token。
          GH_TOKEN: ${{ secrets.COPILOT_REVIEW_REQUEST_TOKEN || steps.copilot-review-token.outputs.token }}
          GH_READ_TOKEN: ${{ steps.copilot-review-token.outputs.token }}
          # 使用 PAT 时留空，由脚本通过 gh api user 解析实际请求账号。
          EXPECTED_REQUEST_ACTOR: ${{ secrets.COPILOT_REVIEW_REQUEST_TOKEN == '' && format('{0}[bot]', steps.copilot-review-token.outputs.app-slug) || '' }}
          COPILOT_REVIEW_REQUEST_CONFIRM_SECONDS: '60'
          COPILOT_REVIEW_REQUEST_POLL_SECONDS: '5'
        run: node .github/scripts/pr-governance.js request-copilot-review

  auto-approve:
    name: Auto Approve
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    # 该 job 不能作为 required check；它只负责尝试给核心开发者提交的 PR 自动 APPROVE。
    # 是否真的是核心开发者由脚本读取 TRUSTED_DEVELOPERS 和 workflow:source-actor 后判断。
    if: github.event_name == 'pull_request_target'
    steps:
      - name: Create governance app token
        id: governance-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.WORKFLOW_AUTOMATION_APP_CLIENT_ID }}
          private-key: ${{ secrets.WORKFLOW_AUTOMATION_APP_PRIVATE_KEY }}
          permission-contents: read
          permission-pull-requests: write

      - name: Checkout governance scripts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false
          token: ${{ steps.governance-token.outputs.token }}
          persist-credentials: false

      - name: Submit approval for trusted author
        env:
          GH_TOKEN: ${{ steps.governance-token.outputs.token }}
        run: node .github/scripts/pr-governance.js auto-approve

  main-authorization-gate:
    name: Main Authorization Gate
    needs: auto-approve
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    # main 目标 PR 必须满足：原始提交人是核心开发者，或当前 head SHA 获得核心开发者审批。
    if: >-
      always() &&
      github.event.pull_request.base.ref == 'main'
    steps:
      - name: Create governance app token
        id: governance-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.WORKFLOW_AUTOMATION_APP_CLIENT_ID }}
          private-key: ${{ secrets.WORKFLOW_AUTOMATION_APP_PRIVATE_KEY }}
          permission-contents: read
          # 在 PR 上创建/更新 issue comment 需要 App 的 Pull requests: write（Issues: write 只覆盖真正的 issue）。
          permission-pull-requests: write
          permission-issues: write

      - name: Checkout governance scripts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false
          token: ${{ steps.governance-token.outputs.token }}
          persist-credentials: false

      - name: Check trusted approval for main
        env:
          GH_TOKEN: ${{ steps.governance-token.outputs.token }}
          GH_COMMENT_TOKEN: ${{ steps.governance-token.outputs.token }}
        run: node .github/scripts/pr-governance.js main-authorization

  copilot-review-check:
    name: Update Copilot Review Check
    needs: request-copilot-review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    concurrency:
      group: copilot-review-check-${{ github.event.pull_request.number || github.run_id }}
      cancel-in-progress: true
    # Copilot Code Review 本身只会 comment，不会作为 approval/request-changes 阻断合并。
    # 因此这里通过 Checks API 维护自定义 required check: Copilot Code Review Gate。
    # 该 job 自身不作为 required check；它只负责把自定义 check run 更新为
    # in_progress / success / failure。
    # 该门禁不长时间轮询 Copilot；首次未检测到 review 时保持自定义 check in_progress，
    # 等 Copilot 提交 review 后，由下面的 review 事件重新触发并完成同名 required check。
    # 会自动重跑的场景：
    # - Copilot 延迟提交 review: pull_request_review submitted
    # - Copilot 新增/编辑 inline comment: pull_request_review_comment
    # - 用户接受建议并推送修正: pull_request_target synchronize
    # 仅点击 Resolve/Unresolve conversation 不会触发 GitHub Actions；下次有其他事件触发时会读取最新 isResolved。
    # 缺少“严重程度：阻断/建议”或 “Severity: blocking/suggestion” 的 Copilot 评论只会警告，不直接阻断。
    if: >-
      always() &&
      github.event.pull_request.base.ref == 'main'
    steps:
      - name: Create governance app token
        id: governance-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.WORKFLOW_AUTOMATION_APP_CLIENT_ID }}
          private-key: ${{ secrets.WORKFLOW_AUTOMATION_APP_PRIVATE_KEY }}
          permission-contents: read
          # 在 PR 上创建/更新 issue comment 需要 App 的 Pull requests: write（Issues: write 只覆盖真正的 issue）。
          permission-pull-requests: write
          permission-issues: write
          permission-checks: write

      - name: Checkout governance scripts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false
          token: ${{ steps.governance-token.outputs.token }}
          persist-credentials: false

      - name: Update Copilot review check run
        env:
          GH_TOKEN: ${{ steps.governance-token.outputs.token }}
          GH_COMMENT_TOKEN: ${{ steps.governance-token.outputs.token }}
          GH_CHECKS_TOKEN: ${{ steps.governance-token.outputs.token }}
          COPILOT_REVIEW_CHECK_NAME: Copilot Code Review Gate
          REQUEST_COPILOT_RESULT: ${{ needs.request-copilot-review.result }}
        run: node .github/scripts/pr-governance.js copilot-review
