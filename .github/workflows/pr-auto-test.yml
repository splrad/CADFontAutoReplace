# 📋 复用到新项目时的配置步骤：
#   1. 在仓库中创建以下 Secrets（路径：设置 → 机密与变量 → 操作 → 新建仓库机密）：
#      - DeepSeek_API_KEY：DeepSeek API 密钥
#      - MY_PAT：GitHub 个人访问令牌（需要 repo 权限）
#   2. 修改下方 branches-ignore 中的排除分支名，以及 env 中的 TARGET_BRANCH
#   3. 核心开发者（TRUSTED_DEVELOPERS 变量中的用户）推送时会跳过本流程，
#      直接进入向主分支合并的 PR 流程
name: 🚀 集成分支请求创建

on:
  push:
    branches-ignore:
      - test
      - main

concurrency:
  group: pr-to-test-${{ github.ref }}
  cancel-in-progress: true

env:
  SOURCE_BRANCH: ${{ github.ref_name }}
  TARGET_BRANCH: test

jobs:
  automation-integration:
    # ✅ 在 PR 检查列表显示的名称
    name: 🤖 合并变更至测试分支
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # 核心开发者跳过本流程，直接走主分支快速通道
    if: >-
      !contains(fromJSON(vars.TRUSTED_DEVELOPERS || '[]'), github.actor)

    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: 📦 执行代码检出
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: 🧠 生成变更说明
        id: ai-summary
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DeepSeek_API_KEY }}
        run: |
          # 仅提取“本次 push”包含的代码差异，避免回溯分支历史
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"

          if git cat-file -e "$BEFORE" 2>/dev/null; then
            # 正常场景：before..after 就是这次 push 的代码差异范围
            CHANGED_FILES=$(git diff --name-status "$BEFORE" "$AFTER")
            DIFF_SNIPPET=$(git diff --unified=0 --no-color "$BEFORE" "$AFTER" | head -c 20000)
          else
            # 强推等场景：before 不可达时，从 push 事件 payload 读取本次提交并拼接代码差异
            PUSHED_SHAS=$(jq -r '.commits[]?.id' "$GITHUB_EVENT_PATH")
            CHANGED_FILES=$(for sha in $PUSHED_SHAS; do git show --name-status --pretty="" "$sha"; done | sed '/^[[:space:]]*$/d' | awk '!seen[$0]++')
            DIFF_SNIPPET=$(for sha in $PUSHED_SHAS; do git show --unified=0 --no-color --pretty=format:"commit $sha" "$sha"; echo; done | head -c 20000)
          fi

          if [ -z "$CHANGED_FILES" ]; then
            CHANGED_FILES="无代码文件变更"
          fi

          if [ -z "$DIFF_SNIPPET" ]; then
            # 极端兜底：无可用差异时仅保留 after 的代码改动片段
            DIFF_SNIPPET=$(git show --unified=0 --no-color --pretty=format:"commit $AFTER" "$AFTER" 2>/dev/null | head -c 20000)
          fi

          if [ -z "$DIFF_SNIPPET" ]; then
            DIFF_SNIPPET="无可用代码差异片段"
          fi

          # 使用 jq 安全构建 JSON（防止提交信息中的特殊字符导致注入）
          SYSTEM_PROMPT=$(cat <<'PROMPT'
          你是一个 PR 描述生成器。根据本次 push 的代码差异（文件清单与 diff 片段），生成符合 Conventional Commits 规范的标题和结构化变更说明。
          仅依据输入中“本次 push 的代码差异”进行描述，禁止引用分支历史、历史 PR 或历史提交。
          无论本次 push 包含多少提交，只能输出一份最终 PR 说明；若包含多种类型（如 feat/fix/docs），必须在同一份正文中合并呈现，禁止按提交或按类型重复整套模板。

          严格按以下 JSON 格式输出，不要输出任何其他内容：
          {"title": "type(scope): 简短描述", "body": "变更说明正文"}

          标题要求（Conventional Commits 规范）：
          - 格式：type(scope): 简短描述
          - type 必须是以下之一：feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert
          - scope 可选，用括号包裹，表示影响范围（如模块名、功能名），只用英文小写
          - 描述部分用中文，不超过 40 个字符
          - 不要加 emoji、不要加分支名
          - 示例：feat(font): 添加字体回退匹配逻辑、fix(config): 修复配置文件加载空指针、refactor(core): 重构插件初始化流程
          - 如果有破坏性变更，在 type 后加 !，如 feat!: xxx

          正文要求：
          - 必须输出合法的 Markdown 格式，用 \n 表示换行
          - 段落之间用 \n\n（空行）分隔，确保 GitHub 能正确渲染
          - 只允许出现 1 次“变更类型”和 1 次“变更摘要”标题
          - 按以下 Markdown 模板输出（仅保留有内容的段落，没有的就不写）：

            **变更类型：** 单类型写具体类型；多类型写“混合变更（feat/fix/docs）”\n\n**变更摘要：**\n用 1~3 句话概括这次改了什么、为什么改。\n\n**主要改动：**\n- 新功能：按需填写\n- 缺陷修复：按需填写\n- 文档更新：按需填写\n- 其他：按需填写

          - 示例输出（注意 \n 换行）：
            **变更类型：** 混合变更（feat/fix/docs）\n\n**变更摘要：**\n新增字体模糊匹配能力并修复配置空值异常，同时补充关键参数文档，以提升替换准确性和可维护性。\n\n**主要改动：**\n- 新功能：在 FontMatcher 模块引入 FuzzyMatch 流程，基于编辑距离计算相似度并纳入替换决策链路。\n- 缺陷修复：在配置解析阶段增加空值防护，消除空指针异常并提升执行稳定性。\n- 文档更新：补充 fuzzyThreshold 参数定义、取值范围与示例，降低配置歧义。
          - 使用专业、客观、克制的工程语气，面向代码评审场景
          - 禁止口语化和网络化表达（如「两块料」「没辙」「清掉」「搞定」「顺手」等）
          - 变更摘要必须明确“改动对象 + 行为变化 + 目的/收益”，避免空泛结论
          - 主要改动每条必须采用“改动对象 + 变更动作 + 影响范围/收益”的技术表述
          - 主要改动优先引用模块名、函数名、配置项或流程节点，避免泛化描述
          - 主要改动禁止使用口语、夸张词和主观评价（如“很大提升”“更聪明”“更优雅”）
          - 术语白名单（优先使用）：模块、子系统、调用链路、执行路径、配置项、参数、阈值、异常处理、边界条件、兼容性、回归风险、性能开销、可观测性、单元测试、集成测试、发布影响
          - 术语黑名单（禁止使用）：黑科技、丝滑、无脑、随手、顺便、搞一下、一把梭、完美、炸裂
          - 主要改动每条至少包含 1 个白名单术语；若场景不适配，使用“对象 + 动作 + 影响”替代表达并保持技术准确
          - 总长度控制在 4~12 行
          PROMPT
          )

          PAYLOAD=$(jq -n \
            --arg changed_files "$CHANGED_FILES" \
            --arg diff_snippet "$DIFF_SNIPPET" \
            --arg system_prompt "$SYSTEM_PROMPT" \
            '{
              model: "deepseek-chat",
              messages: [
                {
                  role: "system",
                  content: $system_prompt
                },
                {
                  role: "user",
                  content: ("本次 push 代码文件变更：\n" + $changed_files + "\n\n本次 push 代码差异片段：\n" + $diff_snippet)
                }
              ]
            }')

          # 调用 DeepSeek 接口进行语义化总结（限时 30s，失败重试 2 次）
          RESPONSE=$(curl -sf --max-time 30 --retry 2 --retry-max-time 60 \
            https://api.deepseek.com/v1/chat/completions \
            -H "Authorization: Bearer $DEEPSEEK_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD") || RESPONSE=""
          
          # 解析返回
          SUMMARY=""
          AI_TITLE=""
          if [ -n "$RESPONSE" ]; then
            AI_CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')
            # 提取 JSON 中的 title 和 body（兼容 AI 输出被 markdown 代码块包裹的情况）
            AI_CONTENT_CLEAN=$(echo "$AI_CONTENT" | sed 's/^```json//;s/^```//')
            AI_TITLE=$(echo "$AI_CONTENT_CLEAN" | jq -r '.title // empty' 2>/dev/null)
            SUMMARY=$(echo "$AI_CONTENT_CLEAN" | jq -r '.body // empty' 2>/dev/null)
          fi

          # 兜底（防止 API 异常或网络失败）
          if [ -z "$AI_TITLE" ]; then
            AI_TITLE="$SOURCE_BRANCH ➔ $TARGET_BRANCH"
          fi
          if [ -z "$SUMMARY" ]; then
            SUMMARY="⚠️ 自动生成失败，请手动填写变更说明。"
          fi
          
          # 将内容注入环境变量（处理多行文本的安全性写法）
          echo "AI_PR_TITLE=$AI_TITLE" >> "$GITHUB_ENV"
          echo "AI_PR_BODY<<EOF" >> "$GITHUB_ENV"
          echo "$SUMMARY" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

      - name: 🔁 执行合并请求生成与状态判定
        env:
          GH_TOKEN: ${{ secrets.MY_PAT }}
          PR_TITLE: ${{ env.AI_PR_TITLE }}
          PR_BODY_CONTENT: ${{ env.AI_PR_BODY }}
        run: |
          # 检查源分支相对目标分支是否有新提交，若无差异则跳过
          AHEAD_COUNT=$(git rev-list --count "origin/$TARGET_BRANCH".."origin/$SOURCE_BRANCH" 2>/dev/null || echo "0")
          if [ "$AHEAD_COUNT" -eq 0 ]; then
            echo "⏭️ $SOURCE_BRANCH 与 $TARGET_BRANCH 无差异提交，跳过 PR 创建。"
            exit 0
          fi

          # 使用 REST API 查询是否存在对应 PR，避免 GraphQL 额外权限依赖
          REPO="$GITHUB_REPOSITORY"
          OWNER="${REPO%%/*}"
          EXISTING_PR_NUMBER=$(gh api --method GET \
            -H "Accept: application/vnd.github+json" \
            "repos/$REPO/pulls" \
            -f state="open" \
            -f head="${OWNER}:$SOURCE_BRANCH" \
            -f base="$TARGET_BRANCH" \
            -f per_page=1 \
            --jq '.[0].number // empty')

          if [ -z "$EXISTING_PR_NUMBER" ]; then
            echo "未检测到现有集成请求，正在初始化交付程序..."
            gh api --method POST \
              -H "Accept: application/vnd.github+json" \
              "repos/$REPO/pulls" \
              -f base="$TARGET_BRANCH" \
              -f head="$SOURCE_BRANCH" \
              -f title="$PR_TITLE" \
              -f body="$PR_BODY_CONTENT" >/dev/null
          else
            echo "检测到已存在的集成请求，正在同步更新变更说明..."
            gh api --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "repos/$REPO/pulls/$EXISTING_PR_NUMBER" \
              -f title="$PR_TITLE" \
              -f body="$PR_BODY_CONTENT" >/dev/null
          fi
