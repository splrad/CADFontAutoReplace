# 📋 复用到新项目时的配置步骤：
#   1. 在仓库中创建以下 Secrets（路径：设置 → 机密与变量 → 操作 → 新建仓库机密）：
#      - DeepSeek_API_KEY：DeepSeek API 密钥
#      - MY_PAT：GitHub 个人访问令牌（需要 repo 权限）
#   2. 修改下方 branches-ignore 中的排除分支名，以及 env 中的 TARGET_BRANCH
name: 🚀 集成分支请求创建

on:
  push:
    branches-ignore:
      - test
      - main

concurrency:
  group: pr-to-test-${{ github.ref }}
  cancel-in-progress: true

env:
  SOURCE_BRANCH: ${{ github.ref_name }}
  TARGET_BRANCH: test

jobs:
  automation-integration:
    # ✅ 在 PR 检查列表显示的名称
    name: 🤖 合并变更至测试分支
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: 📦 执行代码检出
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: 🧠 生成变更说明
        id: ai-summary
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DeepSeek_API_KEY }}
        run: |
          # 提取本次推送包含的提交记录
          # 强制推送时 before 指向的旧 commit 可能已不存在，需要降级处理
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"

          if git cat-file -e "$BEFORE" 2>/dev/null; then
            CHANGES=$(git log "${BEFORE}..${AFTER}" --pretty=format:"- %s" -n 15)
          else
            # 降级：对比目标分支，获取本分支独有的提交
            CHANGES=$(git log "origin/${TARGET_BRANCH}..${AFTER}" --pretty=format:"- %s" -n 15)
          fi

          if [ -z "$CHANGES" ]; then
            CHANGES="无明显变更"
          fi

          # 使用 jq 安全构建 JSON（防止提交信息中的特殊字符导致注入）
          SYSTEM_PROMPT=$(cat <<'PROMPT'
          你是一个 PR 描述生成器。根据 Git 提交记录，生成符合 Conventional Commits 规范的标题和结构化变更说明。

          严格按以下 JSON 格式输出，不要输出任何其他内容：
          {"title": "type(scope): 简短描述", "body": "变更说明正文"}

          标题要求（Conventional Commits 规范）：
          - 格式：type(scope): 简短描述
          - type 必须是以下之一：feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert
          - scope 可选，用括号包裹，表示影响范围（如模块名、功能名），只用英文小写
          - 描述部分用中文，不超过 40 个字符
          - 不要加 emoji、不要加分支名
          - 示例：feat(font): 添加字体回退匹配逻辑、fix(config): 修复配置文件加载空指针、refactor(core): 重构插件初始化流程
          - 如果有破坏性变更，在 type 后加 !，如 feat!: xxx

          正文要求：
          - 必须输出合法的 Markdown 格式，用 \n 表示换行
          - 段落之间用 \n\n（空行）分隔，确保 GitHub 能正确渲染
          - 按以下 Markdown 模板输出（仅保留有内容的段落，没有的就不写）：

            **变更类型：** type 的中文说明（如：新功能 / 缺陷修复 / 重构 / 性能优化 等）\n\n**变更摘要：**\n用 1~3 句话概括这次改了什么、为什么改。\n\n**主要改动：**\n- 具体改动点1\n- 具体改动点2

          - 示例输出（注意 \n 换行）：
            **变更类型：** 新功能\n\n**变更摘要：**\n给字体替换加了模糊匹配，之前只能精确匹配，遇到相似字体名就没辙。\n\n**主要改动：**\n- FontMatcher 新增 FuzzyMatch() 方法，基于编辑距离做相似度计算\n- 替换流程优先走精确匹配，没命中再走模糊\n- 配置文件新增 fuzzyThreshold 字段控制匹配阈值
          - 像真人开发者随手写的，不要有 AI 味（禁止「本次更新」「旨在」「致力于」「进一步」等套话）
          - 用短句，直接说改了什么、为什么改
          - 有技术含量但不堆砌术语
          - 总长度控制在 4~12 行
          PROMPT
          )

          PAYLOAD=$(jq -n \
            --arg changes "$CHANGES" \
            --arg system_prompt "$SYSTEM_PROMPT" \
            '{
              model: "deepseek-chat",
              messages: [
                {
                  role: "system",
                  content: $system_prompt
                },
                {
                  role: "user",
                  content: ("提交记录：\n" + $changes)
                }
              ]
            }')

          # 调用 DeepSeek 接口进行语义化总结（限时 30s，失败重试 2 次）
          RESPONSE=$(curl -sf --max-time 30 --retry 2 --retry-max-time 60 \
            https://api.deepseek.com/v1/chat/completions \
            -H "Authorization: Bearer $DEEPSEEK_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD") || RESPONSE=""
          
          # 解析返回
          SUMMARY=""
          AI_TITLE=""
          if [ -n "$RESPONSE" ]; then
            AI_CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')
            # 提取 JSON 中的 title 和 body（兼容 AI 输出被 markdown 代码块包裹的情况）
            AI_CONTENT_CLEAN=$(echo "$AI_CONTENT" | sed 's/^```json//;s/^```//')
            AI_TITLE=$(echo "$AI_CONTENT_CLEAN" | jq -r '.title // empty' 2>/dev/null)
            SUMMARY=$(echo "$AI_CONTENT_CLEAN" | jq -r '.body // empty' 2>/dev/null)
          fi

          # 兜底（防止 API 异常或网络失败）
          if [ -z "$AI_TITLE" ]; then
            AI_TITLE="$SOURCE_BRANCH ➔ $TARGET_BRANCH"
          fi
          if [ -z "$SUMMARY" ]; then
            SUMMARY="⚠️ 自动生成失败，请手动填写变更说明。"
          fi
          
          # 将内容注入环境变量（处理多行文本的安全性写法）
          echo "AI_PR_TITLE=$AI_TITLE" >> "$GITHUB_ENV"
          echo "AI_PR_BODY<<EOF" >> "$GITHUB_ENV"
          echo "$SUMMARY" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

      - name: 🔁 执行合并请求生成与状态判定
        env:
          GH_TOKEN: ${{ secrets.MY_PAT }}
          PR_TITLE: ${{ env.AI_PR_TITLE }}
          PR_BODY_CONTENT: ${{ env.AI_PR_BODY }}
        run: |
          # 检查是否已经存在对应的 PR
          PR_EXISTS=$(gh pr list --head "$SOURCE_BRANCH" --base "$TARGET_BRANCH" --json url --jq '.[0].url')
          
          if [ -z "$PR_EXISTS" ]; then
            echo "未检测到现有集成请求，正在初始化交付程序..."
            gh pr create \
              --base "$TARGET_BRANCH" \
              --head "$SOURCE_BRANCH" \
              --title "$PR_TITLE" \
              --body "$PR_BODY_CONTENT"
          else
            echo "检测到已存在的集成请求，正在同步更新变更说明..."
            gh pr edit "$PR_EXISTS" --title "$PR_TITLE" --body "$PR_BODY_CONTENT"
          fi
