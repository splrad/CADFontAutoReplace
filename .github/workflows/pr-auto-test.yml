# 📋 复用到新项目时的配置步骤：
#   1) 创建仓库 Secrets（路径：Settings → Secrets and variables → Actions → New repository secret）
#      Secret 名称必须与下方完全一致（区分大小写）：
#      - DeepSeek_API_KEY：DeepSeek Key，示例值格式：sk-xxxxxxxx
#      - MY_PAT：GitHub PAT（建议最小权限覆盖：Pull requests 读写、Contents 读写）
#   2) 修改下方 branches-ignore 与 TARGET_BRANCH，使其符合你的测试分支命名
#   3) 可选：在仓库 Variables 中创建 TRUSTED_DEVELOPERS（JSON 数组）
#      示例：["splrad", "another-user"]
#      命中该名单的用户将跳过本流程，直接进入主分支 PR 快速通道
#   4) 通知机制：PR 创建/更新成功后，自动请求核心成员评审并发布状态评论（评论不展示通知对象）
#      GitHub 将按通知设置向被 @ 用户发送官方通知邮件（无需配置 SMTP）
#   5) 验证建议：推送任意 feature 分支，确认自动建 PR 与官方通知都正常
name: 🚀 测试分支合并请求创建

on:
  push:
    branches-ignore:
      - test
      - main

concurrency:
  group: pr-to-test-${{ github.ref }}
  cancel-in-progress: true

env:
  SOURCE_BRANCH: ${{ github.ref_name }}
  TARGET_BRANCH: test

jobs:
  automation-integration:
    # ✅ 在 PR 检查列表显示的名称
    name: 🤖 合并变更至测试分支
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # 核心开发者跳过本流程，直接走主分支快速通道
    if: >-
      !contains(fromJSON(vars.TRUSTED_DEVELOPERS || '[]'), github.actor)

    permissions:
      pull-requests: write
      contents: read
      issues: write

    env:
      SKIP_PR_AUTOMATION: 'false'
      CURRENT_PR_NUMBER: ''
      AI_PR_TITLE: ''
      AI_PR_BODY: ''

    steps:
      - name: 📦 执行代码检出
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: 🔍 定位当前集成请求
        env:
          GH_TOKEN: ${{ secrets.MY_PAT }}
        run: |
          # 检查源分支相对目标分支是否有新提交，若无差异则跳过
          AHEAD_COUNT=$(git rev-list --count "origin/$TARGET_BRANCH".."origin/$SOURCE_BRANCH" 2>/dev/null || echo "0")
          if [ "$AHEAD_COUNT" -eq 0 ]; then
            echo "⏭️ $SOURCE_BRANCH 与 $TARGET_BRANCH 无差异提交，跳过 PR 创建与描述生成。"
            echo "SKIP_PR_AUTOMATION=true" >> "$GITHUB_ENV"
            exit 0
          fi

          REPO="$GITHUB_REPOSITORY"
          OWNER="${REPO%%/*}"

          # 只识别当前 source->target 的最新打开 PR，避免历史已关闭 PR 干扰
          CURRENT_PR_NUMBER=$(gh api --method GET \
            -H "Accept: application/vnd.github+json" \
            "repos/$REPO/pulls" \
            -f state="open" \
            -f head="${OWNER}:$SOURCE_BRANCH" \
            -f base="$TARGET_BRANCH" \
            -f sort="created" \
            -f direction="desc" \
            -f per_page=1 \
            --jq '.[0].number // empty')

          if [ -z "$CURRENT_PR_NUMBER" ]; then
            echo "未检测到当前打开的集成请求，正在先创建占位 PR..."
            CURRENT_PR_NUMBER=$(gh api --method POST \
              -H "Accept: application/vnd.github+json" \
              "repos/$REPO/pulls" \
              -f base="$TARGET_BRANCH" \
              -f head="$SOURCE_BRANCH" \
              -f title="$SOURCE_BRANCH ➔ $TARGET_BRANCH" \
              -f body="正在基于当前 PR 的 diff 生成说明..." \
              --jq '.number')
          else
            echo "检测到当前打开的集成请求：#$CURRENT_PR_NUMBER"
          fi

          echo "CURRENT_PR_NUMBER=$CURRENT_PR_NUMBER" >> "$GITHUB_ENV"

      - name: 🧠 基于当前PR净差异生成变更说明
        id: ai-summary
        if: env.SKIP_PR_AUTOMATION != 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DeepSeek_API_KEY }}
          GH_TOKEN: ${{ secrets.MY_PAT }}
        run: |
          REPO="$GITHUB_REPOSITORY"
          TARGET_REF="origin/$TARGET_BRANCH"
          SOURCE_REF="origin/$SOURCE_BRANCH"

          # 记录 push 事件中的 before/after，仅作为最终兜底差异来源
          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.event.after }}"
          if [ -z "$AFTER_SHA" ]; then
            AFTER_SHA="$GITHUB_SHA"
          fi

          CHANGED_FILES=""
          DIFF_SNIPPET=""
          DIFF_SOURCE=""
          DIFF_RESOLVED="false"
          MAX_DIFF_CHARS=20000
          PRIORITY_TRUNCATE_THRESHOLD=20000

          build_diff_from_compare_json() {
            local compare_json="$1"
            local patch_total_chars
            [ -z "$compare_json" ] && return 1

            CHANGED_FILES=$(echo "$compare_json" | jq -r '.files[]? | "\(.status | ascii_upcase)\t\(.filename)"')
            patch_total_chars=$(echo "$compare_json" | jq -r '[.files[]? | .patch // ""] | join("\n") | length')

            if [ "$patch_total_chars" -gt "$PRIORITY_TRUNCATE_THRESHOLD" ]; then
              # 超过阈值时优先保留新增/修改最多的文件片段，提高摘要稳定性
              DIFF_SNIPPET=$(echo "$compare_json" | jq -r '
                [.files[]? | select(.patch != null) |
                  {
                    filename: .filename,
                    patch: .patch,
                    score: ((.additions // 0) + (.deletions // 0)),
                    additions: (.additions // 0),
                    deletions: (.deletions // 0)
                  }
                ]
                | sort_by(-.score, -.additions, -.deletions, .filename)
                | .[]
                | ("diff --git a/" + .filename + " b/" + .filename + "\n" + .patch + "\n")
              ' | head -c "$MAX_DIFF_CHARS")
            else
              DIFF_SNIPPET=$(echo "$compare_json" | jq -r '
                .files[]? | select(.patch != null) |
                ("diff --git a/" + .filename + " b/" + .filename + "\n" + .patch + "\n")
              ' | head -c "$MAX_DIFF_CHARS")
            fi

            return 0
          }

          build_diff_from_push_commits_json() {
            local commits_json="$1"
            local patch_total_chars
            [ -z "$commits_json" ] && return 1

            CHANGED_FILES=$(echo "$commits_json" | jq -r '
              [.[] | .files[]? | "\(.status | ascii_upcase)\t\(.filename)"]
              | unique
              | .[]
            ')
            patch_total_chars=$(echo "$commits_json" | jq -r '[.[] | .files[]? | .patch // ""] | join("\n") | length')

            if [ "$patch_total_chars" -gt "$PRIORITY_TRUNCATE_THRESHOLD" ]; then
              DIFF_SNIPPET=$(echo "$commits_json" | jq -r '
                [.[] | .files[]? | select(.patch != null) |
                  {
                    filename: .filename,
                    patch: .patch,
                    score: ((.additions // 0) + (.deletions // 0)),
                    additions: (.additions // 0),
                    deletions: (.deletions // 0)
                  }
                ]
                | sort_by(-.score, -.additions, -.deletions, .filename)
                | .[]
                | ("diff --git a/" + .filename + " b/" + .filename + "\n" + .patch + "\n")
              ' | head -c "$MAX_DIFF_CHARS")
            else
              DIFF_SNIPPET=$(echo "$commits_json" | jq -r '
                .[] | .files[]? | select(.patch != null) |
                ("diff --git a/" + .filename + " b/" + .filename + "\n" + .patch + "\n")
              ' | head -c "$MAX_DIFF_CHARS")
            fi

            return 0
          }

          # 先刷新目标分支和来源分支引用，避免使用过期远端指针
          git fetch --no-tags origin "$TARGET_BRANCH" "$SOURCE_BRANCH" >/dev/null 2>&1 || true
          SOURCE_SHA=""
          if git rev-parse --verify "$SOURCE_REF^{commit}" >/dev/null 2>&1; then
            SOURCE_SHA=$(git rev-parse "$SOURCE_REF^{commit}")
          fi

          # 优先使用 PR merge ref 与目标分支对比，得到“当前 PR 若合入后的净变化”
          if [ -n "$CURRENT_PR_NUMBER" ]; then
            PR_MERGE_REF="refs/remotes/origin/pr/$CURRENT_PR_NUMBER/merge"
            if git fetch --no-tags origin "refs/pull/$CURRENT_PR_NUMBER/merge:$PR_MERGE_REF" >/dev/null 2>&1 && \
               git rev-parse --verify "$PR_MERGE_REF^{commit}" >/dev/null 2>&1 && \
               git rev-parse --verify "$TARGET_REF^{commit}" >/dev/null 2>&1; then
              PR_MERGE_SOURCE_SHA=""
              MERGE_REF_STALE="false"
              if git rev-parse --verify "$PR_MERGE_REF^2^{commit}" >/dev/null 2>&1; then
                PR_MERGE_SOURCE_SHA=$(git rev-parse "$PR_MERGE_REF^2^{commit}")
                if [ -n "$SOURCE_SHA" ] && [ "$PR_MERGE_SOURCE_SHA" != "$SOURCE_SHA" ]; then
                  MERGE_REF_STALE="true"
                fi
              fi

              if [ "$MERGE_REF_STALE" = "true" ]; then
                echo "检测到 PR merge ref 未对齐来源分支最新提交，回退两点差异。"
              else
                CHANGED_FILES=$(git diff --name-status "$TARGET_REF..$PR_MERGE_REF")
                DIFF_SNIPPET=$(git diff --unified=0 --no-color "$TARGET_REF..$PR_MERGE_REF" | head -c "$MAX_DIFF_CHARS")

                if [ -z "$CHANGED_FILES" ] && [ -n "$SOURCE_SHA" ]; then
                  GUARD_CHANGED_FILES=$(git diff --name-status "$TARGET_REF..$SOURCE_REF")
                  if [ -n "$GUARD_CHANGED_FILES" ]; then
                    CHANGED_FILES="$GUARD_CHANGED_FILES"
                    DIFF_SNIPPET=$(git diff --unified=0 --no-color "$TARGET_REF..$SOURCE_REF" | head -c "$MAX_DIFF_CHARS")
                    DIFF_SOURCE="target_two_dot_guard"
                  else
                    DIFF_SOURCE="pr_merge_ref"
                  fi
                else
                  DIFF_SOURCE="pr_merge_ref"
                fi

                DIFF_RESOLVED="true"
              fi
            fi
          fi

          # PR merge ref 不可用（例如冲突）时，回退到目标分支与来源分支的两点差异
          if [ "$DIFF_RESOLVED" != "true" ] && \
             git rev-parse --verify "$TARGET_REF^{commit}" >/dev/null 2>&1 && \
             git rev-parse --verify "$SOURCE_REF^{commit}" >/dev/null 2>&1; then
            CHANGED_FILES=$(git diff --name-status "$TARGET_REF..$SOURCE_REF")
            DIFF_SNIPPET=$(git diff --unified=0 --no-color "$TARGET_REF..$SOURCE_REF" | head -c "$MAX_DIFF_CHARS")
            DIFF_SOURCE="target_two_dot"
            DIFF_RESOLVED="true"
          fi

          # 仍不可用时，回退到 push 事件 compare API（仅限本次 push）
          if [ "$DIFF_RESOLVED" != "true" ]; then
            COMPARE_JSON=""
            if [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
              COMPARE_JSON=$(gh api --method GET \
                -H "Accept: application/vnd.github+json" \
                "repos/$REPO/compare/$BEFORE_SHA...$AFTER_SHA" 2>/dev/null || true)
            fi

            if [ -n "$COMPARE_JSON" ] && build_diff_from_compare_json "$COMPARE_JSON"; then
              DIFF_SOURCE="push_compare_api"
              DIFF_RESOLVED="true"
            fi
          fi

          # compare API 不可用时，回退读取本次 push 的提交明细
          if [ "$DIFF_RESOLVED" != "true" ]; then
            PUSH_COMMIT_SHAS=$(jq -r '.commits[]?.id // empty' "$GITHUB_EVENT_PATH")
            if [ -n "$PUSH_COMMIT_SHAS" ]; then
              PUSH_COMMITS_JSON=$(while IFS= read -r sha; do
                [ -z "$sha" ] && continue
                gh api --method GET \
                  -H "Accept: application/vnd.github+json" \
                  "repos/$REPO/commits/$sha" 2>/dev/null || true
              done <<< "$PUSH_COMMIT_SHAS" | jq -s '.')

              if build_diff_from_push_commits_json "$PUSH_COMMITS_JSON"; then
                DIFF_SOURCE="push_commits_api"
                DIFF_RESOLVED="true"
              fi
            fi
          fi

          # 最后兜底：before/after 在本地可达时读取本地 push 增量
          if [ "$DIFF_RESOLVED" != "true" ] && [ -n "$BEFORE_SHA" ] && [ -n "$AFTER_SHA" ] && \
             git cat-file -e "$BEFORE_SHA^{commit}" 2>/dev/null && git cat-file -e "$AFTER_SHA^{commit}" 2>/dev/null; then
            CHANGED_FILES=$(git diff --name-status "$BEFORE_SHA" "$AFTER_SHA")
            DIFF_SNIPPET=$(git diff --unified=0 --no-color "$BEFORE_SHA" "$AFTER_SHA" | head -c "$MAX_DIFF_CHARS")
            DIFF_SOURCE="push_local_diff"
            DIFF_RESOLVED="true"
          fi

          if [ -z "$DIFF_SOURCE" ]; then
            DIFF_SOURCE="none"
          fi

          echo "差异来源: $DIFF_SOURCE"

          if [ -z "$CHANGED_FILES" ]; then
            CHANGED_FILES="当前 PR 相对目标分支无代码文件差异"
          fi

          if [ -z "$DIFF_SNIPPET" ]; then
            DIFF_SNIPPET="当前 PR 相对目标分支无可用代码差异片段"
          fi

          # 使用 jq 安全构建 JSON（防止提交信息中的特殊字符导致注入）
          SYSTEM_PROMPT=$(cat <<'PROMPT'
          你是一个 PR 描述生成器。根据当前 PR 相对目标分支的净代码差异（文件清单与 diff 片段），生成符合 Conventional Commits 规范的标题和结构化变更说明。
          仅依据输入中的差异内容进行描述，禁止引用分支历史、历史 PR 或历史提交。
          禁止复用、拼接或改写任何已有 PR 描述文本（包括当前已打开 PR 的正文）；正文必须完全基于当前输入重新生成。
          无论当前 PR 包含多少提交，只能输出一份最终 PR 说明；若包含多种类型（如 feat/fix/docs），必须在同一份正文中合并呈现，禁止按提交或按类型重复整套模板。

          严格按以下 JSON 格式输出，不要输出任何其他内容：
          {"title": "type(scope): 简短描述", "body": "变更说明正文"}

          标题要求（Conventional Commits 规范）：
          - 格式：type(scope): 简短描述
          - type 必须是以下之一：feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert
          - scope 可选，用括号包裹，表示影响范围（如模块名、功能名），只用英文小写
          - 描述部分用中文，不超过 40 个字符
          - 不要加 emoji、不要加分支名
          - 示例：feat(font): 添加字体回退匹配逻辑、fix(config): 修复配置文件加载空指针、refactor(core): 重构插件初始化流程
          - 如果有破坏性变更，在 type 后加 !，如 feat!: xxx

          正文要求：
          - 必须输出合法的 Markdown 格式，用 \n 表示换行
          - 段落之间用 \n\n（空行）分隔，确保 GitHub 能正确渲染
          - 只允许出现 1 次“变更类型”和 1 次“变更摘要”标题
          - 按以下 Markdown 模板输出（仅保留有内容的段落，没有的就不写）：

            **变更类型：** 单类型写具体类型；多类型写“混合变更（feat/fix/docs）”\n\n**变更摘要：**\n用 1~3 句话概括这次改了什么、为什么改。\n\n**主要改动：**\n- 新功能：按需填写\n- 缺陷修复：按需填写\n- 文档更新：按需填写\n- 其他：按需填写

          - 示例输出（注意 \n 换行）：
            **变更类型：** 混合变更（feat/fix/docs）\n\n**变更摘要：**\n新增字体模糊匹配能力并修复配置空值异常，同时补充关键参数文档，以提升替换准确性和可维护性。\n\n**主要改动：**\n- 新功能：在 FontMatcher 模块引入 FuzzyMatch 流程，基于编辑距离计算相似度并纳入替换决策链路。\n- 缺陷修复：在配置解析阶段增加空值防护，消除空指针异常并提升执行稳定性。\n- 文档更新：补充 fuzzyThreshold 参数定义、取值范围与示例，降低配置歧义。
          - 使用专业、客观、克制的工程语气，面向代码评审场景
          - 禁止口语化和网络化表达
          - 变更摘要必须明确“改动对象 + 行为变化 + 目的/收益”，避免空泛结论
          - 主要改动每条必须采用“改动对象 + 变更动作 + 影响范围/收益”的技术表述
          - 主要改动优先引用模块名、函数名、配置项或流程节点，避免泛化描述
          - 主要改动禁止使用口语、夸张词和主观评价（如“很大提升”“更聪明”“更优雅”）
          - 术语白名单（优先使用）：模块、子系统、调用链路、执行路径、配置项、参数、阈值、异常处理、边界条件、兼容性、回归风险、性能开销、可观测性、单元测试、集成测试、发布影响
          - 术语黑名单（禁止使用）：黑科技、丝滑、无脑、随手、顺便、搞一下、一把梭、完美、炸裂
          - 主要改动每条至少包含 1 个白名单术语；若场景不适配，使用“对象 + 动作 + 影响”替代表达并保持技术准确
          - 总长度控制在 4~12 行
          PROMPT
          )

          build_payload() {
            local diff_snippet_for_payload="$1"
            jq -n \
              --arg changed_files "$CHANGED_FILES" \
              --arg diff_snippet "$diff_snippet_for_payload" \
              --arg diff_source "$DIFF_SOURCE" \
              --arg system_prompt "$SYSTEM_PROMPT" \
              '{
                model: "deepseek-chat",
                messages: [
                  {
                    role: "system",
                    content: $system_prompt
                  },
                  {
                    role: "user",
                    content: ("差异来源：" + $diff_source + "\n\n当前 PR 代码文件变更：\n" + $changed_files + "\n\n当前 PR 代码差异片段：\n" + $diff_snippet)
                  }
                ]
              }'
          }

          call_deepseek() {
            local payload="$1"
            local response_file http_code
            response_file="$RUNNER_TEMP/deepseek_response_${CURRENT_PR_NUMBER:-0}.json"

            http_code=$(curl -sS --max-time 45 --retry 1 --retry-delay 2 --retry-max-time 60 \
              -o "$response_file" -w "%{http_code}" \
              https://api.deepseek.com/v1/chat/completions \
              -H "Authorization: Bearer $DEEPSEEK_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$payload" 2>/dev/null || true)

            if [ "$http_code" = "200" ]; then
              RESPONSE=$(cat "$response_file")
              AI_ERROR_MSG=""
              return 0
            fi

            AI_ERROR_MSG=$(jq -r '.error.message // .message // empty' "$response_file" 2>/dev/null || true)
            if [ -z "$AI_ERROR_MSG" ]; then
              if [ -n "$http_code" ]; then
                AI_ERROR_MSG="HTTP_$http_code"
              else
                AI_ERROR_MSG="network_or_timeout"
              fi
            fi

            RESPONSE=""
            return 1
          }

          build_fallback_summary() {
            local files_preview reason_line
            files_preview=$(printf '%s\n' "$CHANGED_FILES" | sed 's/\t/  /g' | head -n 8 | sed 's/^/- /')
            [ -z "$files_preview" ] && files_preview="- 无可用文件差异"

            reason_line="$DIFF_SOURCE"
            if [ -n "$AI_ERROR_MSG" ]; then
              reason_line="$reason_line；$AI_ERROR_MSG"
            fi

            printf '%s\n\n%s\n%s\n\n%s\n%s\n' \
              '**变更类型：** chore' \
              '**变更摘要：**' \
              "自动摘要服务未返回可解析结果（$reason_line），以下为当前 PR 净差异的兜底说明。" \
              '**主要改动：**' \
              "$files_preview"
          }

          DIFF_SNIPPET_FOR_AI="$DIFF_SNIPPET"
          PAYLOAD=$(build_payload "$DIFF_SNIPPET_FOR_AI")
          RESPONSE=""
          AI_ERROR_MSG=""
          call_deepseek "$PAYLOAD" || true

          # 调用失败时缩短 diff 后重试一次，提升稳定性
          if [ -z "$RESPONSE" ]; then
            DIFF_SNIPPET_FOR_AI=$(printf '%s' "$DIFF_SNIPPET" | head -c 8000)
            PAYLOAD=$(build_payload "$DIFF_SNIPPET_FOR_AI")
            call_deepseek "$PAYLOAD" || true
          fi

          # 规范化正文：剔除代码块包裹，并在模型重复输出模板时只保留最后一份
          normalize_pr_body() {
            local raw="$1"
            local cleaned last_section_line
            cleaned=$(printf '%s\n' "$raw" | sed -e 's/\r$//' -e '/^```json[[:space:]]*$/d' -e '/^```[[:space:]]*$/d')
            last_section_line=$(printf '%s\n' "$cleaned" | awk '/\*\*变更类型：\*\*/ { line=NR } END { if (line) print line }')
            if [ -n "$last_section_line" ]; then
              cleaned=$(printf '%s\n' "$cleaned" | tail -n +"$last_section_line")
            fi
            printf '%s' "$cleaned"
          }

          # 解析返回
          SUMMARY=""
          AI_TITLE=""
          if [ -n "$RESPONSE" ]; then
            AI_CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty' 2>/dev/null)
            # 提取 JSON 中的 title 和 body（兼容 AI 输出被 markdown 代码块包裹）
            AI_CONTENT_CLEAN=$(printf '%s\n' "$AI_CONTENT" | sed -e '/^```json[[:space:]]*$/d' -e '/^```[[:space:]]*$/d')
            AI_TITLE=$(echo "$AI_CONTENT_CLEAN" | jq -r '.title // empty' 2>/dev/null)
            SUMMARY=$(echo "$AI_CONTENT_CLEAN" | jq -r '.body // empty' 2>/dev/null)
            SUMMARY=$(normalize_pr_body "$SUMMARY")

            if [ -z "$AI_TITLE" ] || [ -z "$SUMMARY" ]; then
              if [ -z "$AI_ERROR_MSG" ]; then
                AI_ERROR_MSG="invalid_model_output"
              fi
            fi
          fi

          # 兜底（防止 API 异常或网络失败）
          if [ -z "$AI_TITLE" ]; then
            AI_TITLE="$SOURCE_BRANCH ➔ $TARGET_BRANCH"
          fi
          if [ -z "$SUMMARY" ]; then
            SUMMARY=$(build_fallback_summary)
          fi

          # 将内容注入环境变量（处理多行文本的安全性写法）
          echo "AI_PR_TITLE=$AI_TITLE" >> "$GITHUB_ENV"
          echo "AI_PR_BODY<<EOF" >> "$GITHUB_ENV"
          echo "$SUMMARY" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

      - name: 🔁 回写合并请求标题与说明
        if: env.SKIP_PR_AUTOMATION != 'true'
        env:
          GH_TOKEN: ${{ secrets.MY_PAT }}
          PR_TITLE: ${{ env.AI_PR_TITLE }}
          PR_BODY_CONTENT: ${{ env.AI_PR_BODY }}
        run: |
          REPO="$GITHUB_REPOSITORY"
          PR_NUMBER="$CURRENT_PR_NUMBER"

          gh api --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "repos/$REPO/pulls/$PR_NUMBER" \
            -f title="$PR_TITLE" \
            -f body="$PR_BODY_CONTENT" >/dev/null

      - name: 👥 请求核心成员评审（触发官方通知）
        if: env.SKIP_PR_AUTOMATION != 'true'
        continue-on-error: true
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        env:
          PR_NUMBER: ${{ env.CURRENT_PR_NUMBER }}
          TRUSTED_LIST: ${{ vars.TRUSTED_DEVELOPERS || '[]' }}
          PR_AUTHOR: ${{ github.actor }}
        with:
          github-token: ${{ secrets.MY_PAT || github.token }}
          script: |
            const prNumber = Number(process.env.PR_NUMBER || '0');
            if (!prNumber) {
              core.info('未获取到 PR 编号，跳过评审请求。');
              return;
            }

            let trustedDevelopers = [];
            try {
              const parsed = JSON.parse(process.env.TRUSTED_LIST || '[]');
              if (Array.isArray(parsed)) {
                trustedDevelopers = parsed.filter(Boolean);
              }
            } catch (err) {
              core.warning(`TRUSTED_DEVELOPERS 解析失败: ${err.message}`);
            }

            const prAuthor = (process.env.PR_AUTHOR || '').trim();
            const reviewers = [...new Set(trustedDevelopers.filter(user => user !== prAuthor))];

            if (reviewers.length === 0) {
              core.info('无可请求的核心成员评审对象，跳过。');
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const existing = new Set((pr.requested_reviewers || []).map(user => user.login));
            const pending = reviewers.filter(user => !existing.has(user)).slice(0, 15);

            if (pending.length === 0) {
              core.info('核心成员评审请求已存在，无需重复请求。');
              return;
            }

            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                reviewers: pending,
              });
              core.info(`已请求核心成员评审：${pending.join(', ')}`);
            } catch (error) {
              if (error.status === 422) {
                core.warning(`请求核心成员评审部分失败：${error.message}`);
                return;
              }
              throw error;
            }

      - name: 📣 发布PR成功通知（触发GitHub官方通知）
        if: env.SKIP_PR_AUTOMATION != 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        env:
          PR_NUMBER: ${{ env.CURRENT_PR_NUMBER }}
          PR_TITLE: ${{ env.AI_PR_TITLE }}
          SOURCE_BRANCH: ${{ env.SOURCE_BRANCH }}
          TARGET_BRANCH: ${{ env.TARGET_BRANCH }}
          ACTOR: ${{ github.actor }}
        with:
          github-token: ${{ secrets.MY_PAT || github.token }}
          script: |
            const marker = '<!-- pr-auto-success-notice -->';
            const prNumber = Number(process.env.PR_NUMBER || '0');
            if (!prNumber) {
              core.info('未获取到 PR 编号，跳过成功通知评论。');
              return;
            }

            const prTitle = (process.env.PR_TITLE || '').trim() || '（空）';
            const prAuthor = (process.env.ACTOR || 'unknown').trim();
            const sourceBranch = (process.env.SOURCE_BRANCH || 'unknown').trim();
            const targetBranch = (process.env.TARGET_BRANCH || 'unknown').trim();
            const prUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/pull/${prNumber}`;

            const body = [
              marker,
              '## ✅ PR 创建成功通知',
              '',
              '> 本通知由 **GitHub Actions** 自动发布。',
              '',
              '### 📌 关键信息',
              `- PR标题：**${prTitle}**`,
              `- 提交人：**${prAuthor}**`,
              `- 分支流向：**${sourceBranch} → ${targetBranch}**`,
              `- PR 链接：${prUrl}`,
              '',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info('已更新 PR 成功通知评论。');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
              core.info('已创建 PR 成功通知评论。');
            }
