name: 自动批准本人 PR

on:
  pull_request_target:
    types: [opened, reopened, synchronize]
    branches:
      - master  # ✅ 只在向 master 提交 PR 时触发自动批准

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    # ❗ 记得替换这里的用户名为你自己的
    if: github.actor == 'splrad'
    permissions:
      pull-requests: write

    steps:
      - name: 自动批准
        uses: hmarr/auto-approve-action@v4
        with:
          # 可选：如果你想让批准消息更有个性
          review-message: "🤖 开发者本人提交，系统已自动通过验证。"