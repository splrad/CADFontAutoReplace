name: 🚀 合并请求自动创建

on:
  push:
    branches:
      - test

jobs:
  automation-integration:
    name: 🤖 合并请求生成与自动化集成控制
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: 📦 执行代码全量检出
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # ❗ 获取完整提交历史，供 AI 分析差异

      - name: 🧠 生成变更说明
        id: ai-summary
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DeepSeek_API_KEY }}
        run: |
          # 提取 master 与当前分支之间的差异记录（最近 15 条）
          CHANGES=$(git log origin/master..HEAD --pretty=format:"- %s" -n 15)

          if [ -z "$CHANGES" ]; then
            CHANGES="无明显变更"
          fi
          
          # 调用 DeepSeek 接口进行语义化总结
          RESPONSE=$(curl https://api.deepseek.com/v1/chat/completions \
            -H "Authorization: Bearer $DEEPSEEK_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"deepseek-chat\",
              \"messages\": [
                {
                \"role\": \"system\", 
                \"content\": \"你是一位资深系统架构师。请将 Git 提交记录转化为简洁清晰的 PR 描述，使用开发者常见表达，避免官话。包含：变更内容、影响范围。使用 Markdown 格式。\"
                },
                {
                \"role\": \"user\", 
                \"content\": \"提交记录如下：\n$CHANGES\"
                }
              ]
            }")
          
          # 解析返回
          SUMMARY=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')

          # 兜底（防止 API 异常）
          if [ -z "$SUMMARY" ] || [ "$SUMMARY" = "null" ]; then
            SUMMARY="⚠️ 自动生成失败，请手动填写变更说明。"
          fi
          
          # 将审计内容注入环境变量（处理多行文本的安全性写法）
          echo "AI_PR_BODY<<EOF" >> $GITHUB_ENV
          echo "$SUMMARY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: 🔁 执行合并请求生成与状态判定
        env:
          # ❗ 关键点：必须使用个人访问令牌 (PAT)
          GH_TOKEN: ${{ secrets.MY_PAT }}
        run: |
          # 检查是否已经存在从 test 到 master 的 PR
          PR_EXISTS=$(gh pr list --head test --base master --json url --jq '.[0].url')
          
          if [ -z "$PR_EXISTS" ]; then
            echo "未检测到现有集成请求，正在初始化交付程序..."
            gh pr create \
              --base master \
              --head test \
              --title "🔄 分支同步： test ➔ master" \
              --body "### 🤖 变更说明
              
              ${{ env.PR_SUMMARY_BODY }}
              
          else
            echo "检测到已存在的集成请求，正在同步更新变更说明..."
            gh pr edit --body "### 🤖 变更说明 (已更新)
            
            ${{ env.PR_SUMMARY_BODY }}
            
          fi