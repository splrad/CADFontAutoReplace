# 📋 复用到新项目时的配置步骤：
#   1) 这条 Release workflow 包含当前项目专用发布逻辑。
#      跨仓库复用时，必须重点修改：
#      - on.push.paths：哪些文件变化会触发发布
#      - Version.props：版本号读取来源
#      - tools/Publish-ReleaseAssets.ps1：构建/打包命令
#      - artifacts/ReleaseAssets 下的资产文件名检查
#      - release notes 中的固定下载说明
#   2) 保留的通用规则：
#      - 只允许来自已合并 PR 的 main 提交发布
#      - tag 已存在时跳过发布
#      - Release notes 优先使用 GitHub 官方 releases/generate-notes API
#      - 发布结果会回写到触发发布的 merged PR
#   3) 如果新项目不是 Version.props 版本源，需要修改 Read version and release state 步骤。
#   4) 如果新项目没有发布资产打包脚本，需要替换 Build deployer / Package release assets / Create GitHub Release。
#   5) 不要把 Release job 设置为 required check；
#      它是合并后的发布流程，不是 PR 合并门禁。
name: Release

on:
  push:
    branches:
      - main
    # 当前项目专用触发路径；复用到新项目时按实际发布输入文件修改。
    paths:
      - Version.props
      - chore/Fonts.zip
      - tools/Publish-ReleaseAssets.ps1
      - src/**
      - .github/workflows/release-build.yml
      - .github/scripts/**
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  # contents: write 用于创建 Release；
  # pull-requests/issues: write 用于把发布结果评论回 merged PR。
  contents: write
  pull-requests: write
  issues: write

jobs:
  release:
    name: Build Assets and Publish Release
    runs-on: windows-latest
    timeout-minutes: 45
    outputs:
      merged_pr_number: ${{ steps.merged-pr-guard.outputs.pr_number }}
      merged_pr_title: ${{ steps.merged-pr-guard.outputs.pr_title }}
      display_version: ${{ steps.version.outputs.display_version }}
      build_id: ${{ steps.version.outputs.build_id }}
      tag_name: ${{ steps.version.outputs.tag_name }}
      release_title: ${{ steps.version.outputs.release_title }}
      should_release: ${{ steps.version.outputs.should_release }}

    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Verify commit came from a merged PR
        id: merged-pr-guard
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          # 发布只允许由“已合并到 main 的 PR”触发。
          # 这样可以阻止直接推送或非 PR 来源提交绕过治理流程后发版。
          $maxAttempts = 10
          $retrySeconds = 6
          $mergedPullRequest = $null

          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
              $associatedPulls = @(gh api "repos/$env:GH_REPO/commits/${{ github.sha }}/pulls" | ConvertFrom-Json)
              $mergedPullRequest = $associatedPulls | Where-Object {
                  $_.state -eq 'closed' -and
                  $null -ne $_.merged_at -and
                  $_.base.ref -eq $env:GITHUB_REF_NAME
              } | Select-Object -First 1

              if ($null -ne $mergedPullRequest) { break }
              if ($attempt -lt $maxAttempts) {
                  Write-Host "Commit is not associated with a merged $env:GITHUB_REF_NAME PR yet; retrying in $retrySeconds seconds."
                  Start-Sleep -Seconds $retrySeconds
              }
          }

          if ($null -eq $mergedPullRequest) {
              throw "Current commit $env:GITHUB_SHA is not associated with a merged PR targeting $env:GITHUB_REF_NAME."
          }

          "pr_number=$($mergedPullRequest.number)" >> $env:GITHUB_OUTPUT
          "pr_title=$([string]$mergedPullRequest.title)" >> $env:GITHUB_OUTPUT
          "Verified merged PR #$($mergedPullRequest.number)." | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Confirm .NET SDK
        shell: pwsh
        run: |
          dotnet --version
          dotnet --list-sdks

      - name: Read version and release state
        id: version
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          # 当前项目从 Version.props 读取 PluginDisplayVersion 与 PluginBuildId。
          # 复用到其他项目时，可改为 package.json、Directory.Build.props、Git tag 等版本源。
          [xml]$versionXml = Get-Content -LiteralPath (Join-Path $env:GITHUB_WORKSPACE 'Version.props') -Raw
          $displayVersion = [string]$versionXml.Project.PropertyGroup.PluginDisplayVersion
          $buildId = [string]$versionXml.Project.PropertyGroup.PluginBuildId
          if ([string]::IsNullOrWhiteSpace($displayVersion) -or [string]::IsNullOrWhiteSpace($buildId)) {
              throw 'Version.props is missing PluginDisplayVersion or PluginBuildId.'
          }
          if ($displayVersion -notmatch '^\d+\.\d+\.\d+$') {
              throw "PluginDisplayVersion must use X.Y.Z format. Current value: $displayVersion"
          }

          $tagName = "v$displayVersion"
          $releaseTitle = "AFR v$displayVersion ($buildId)"
          $latestTag = gh release list --repo $env:GH_REPO --exclude-drafts --exclude-pre-releases --limit 1 --json tagName --jq '.[0].tagName // ""'
          $existingRelease = gh release view $tagName --repo $env:GH_REPO --json tagName --jq '.tagName' 2>$null
          if ($LASTEXITCODE -ne 0) {
              $global:LASTEXITCODE = 0
              $existingRelease = ''
          }

          "display_version=$displayVersion" >> $env:GITHUB_OUTPUT
          "build_id=$buildId" >> $env:GITHUB_OUTPUT
          "tag_name=$tagName" >> $env:GITHUB_OUTPUT
          "release_title=$releaseTitle" >> $env:GITHUB_OUTPUT
          "latest_tag=$latestTag" >> $env:GITHUB_OUTPUT

          if (-not [string]::IsNullOrWhiteSpace($existingRelease)) {
              "should_release=false" >> $env:GITHUB_OUTPUT
              "Release $tagName already exists; skipping build and publish." | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY
              exit 0
          }

          "should_release=true" >> $env:GITHUB_OUTPUT
          "Preparing Release $tagName." | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY

      - name: Build deployer
        if: steps.version.outputs.should_release == 'true'
        shell: pwsh
        # 当前项目专用打包脚本；复用时替换为你的构建/打包命令。
        run: ./tools/Publish-ReleaseAssets.ps1

      - name: Package release assets
        if: steps.version.outputs.should_release == 'true'
        id: package
        shell: pwsh
        run: |
          # 当前项目专用发布资产名；复用时改为目标项目实际需要上传的文件。
          $tagName = '${{ steps.version.outputs.tag_name }}'
          $assetDir = Join-Path $env:GITHUB_WORKSPACE 'artifacts/ReleaseAssets'
          $exeAssetPath = Join-Path $assetDir "AFR-Deployer_$tagName.exe"
          $dllZipAssetPath = Join-Path $assetDir "AFR-DLL_$tagName.zip"
          $fontsAssetPath = Join-Path $assetDir 'Fonts.zip'

          foreach ($asset in @(
              @{ Path = $exeAssetPath; Name = 'deployer exe' },
              @{ Path = $dllZipAssetPath; Name = 'plugin dll zip' },
              @{ Path = $fontsAssetPath; Name = 'fonts zip' }
          )) {
              if (-not (Test-Path -LiteralPath $asset.Path)) {
                  throw "Missing release asset: $($asset.Name) at $($asset.Path)"
              }
              if ((Get-Item -LiteralPath $asset.Path).Length -le 0) {
                  throw "Release asset is empty: $($asset.Path)"
              }
          }

          "exe_path=$exeAssetPath" >> $env:GITHUB_OUTPUT
          "dll_zip_path=$dllZipAssetPath" >> $env:GITHUB_OUTPUT
          "fonts_path=$fontsAssetPath" >> $env:GITHUB_OUTPUT

      - name: Generate release notes
        if: steps.version.outputs.should_release == 'true'
        id: notes
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
          LATEST_TAG: ${{ steps.version.outputs.latest_tag }}
        run: |
          # 使用 GitHub 官方 release notes API 生成 merged PR、contributors、changelog。
          # 下方“下载说明/升级说明”是当前项目固定文案，复用时按项目替换。
          $notesPath = Join-Path $env:GITHUB_WORKSPACE 'release-notes.md'
          $headers = @{
              Accept = 'application/vnd.github+json'
              Authorization = "Bearer $env:GH_TOKEN"
              'X-GitHub-Api-Version' = '2022-11-28'
          }

          $request = @{
              tag_name = $env:TAG_NAME
              target_commitish = '${{ github.sha }}'
          }
          if (-not [string]::IsNullOrWhiteSpace($env:LATEST_TAG)) {
              $request.previous_tag_name = $env:LATEST_TAG
          }

          $generatedBody = ''
          $response = Invoke-WebRequest `
              -Uri "https://api.github.com/repos/$env:GH_REPO/releases/generate-notes" `
              -Method Post `
              -Headers $headers `
              -ContentType 'application/json' `
              -Body ($request | ConvertTo-Json -Compress) `
              -SkipHttpErrorCheck

          if ($response.StatusCode -eq 200) {
              $generatedBody = [string](($response.Content | ConvertFrom-Json).body)
          } else {
              Write-Host "::warning::GitHub generated release notes failed with HTTP $($response.StatusCode)."
          }

          if ([string]::IsNullOrWhiteSpace($generatedBody)) {
              $generatedBody = @(
                  '## Changes',
                  '',
                  "- Release generated from merged PR #${{ steps.merged-pr-guard.outputs.pr_number }}."
              ) -join "`n"
          }

          $lines = @(
              '## 下载说明',
              '',
              '| 文件 | 说明 |',
              '| --- | --- |',
              "| **AFR-Deployer_$env:TAG_NAME.exe** | 主安装程序，双击运行并选择 AutoCAD 版本 |",
              "| AFR-DLL_$env:TAG_NAME.zip | 手动 NETLOAD 用插件 DLL 包 |",
              '| Fonts.zip | 字体资源包（用于手动补充或备份） |',
              '',
              "一般用户只需下载：**AFR-Deployer_$env:TAG_NAME.exe**",
              '',
              '------',
              '',
              $generatedBody.Trim(),
              '',
              '------',
              '',
              '## 升级说明',
              '',
              '- 支持直接覆盖安装',
              '- 无需卸载旧版本',
              '- 已安装字体不会被删除'
          )

          $lines | Set-Content -LiteralPath $notesPath -Encoding utf8
          "notes_path=$notesPath" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.version.outputs.should_release == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          # 将上一步检查过的资产全部上传到同一个 GitHub Release。
          gh release create '${{ steps.version.outputs.tag_name }}' `
              '${{ steps.package.outputs.exe_path }}' `
              '${{ steps.package.outputs.dll_zip_path }}' `
              '${{ steps.package.outputs.fonts_path }}' `
              --repo $env:GH_REPO `
              --target '${{ github.sha }}' `
              --title '${{ steps.version.outputs.release_title }}' `
              --notes-file '${{ steps.notes.outputs.notes_path }}' `
              --latest

          "Created Release ${{ steps.version.outputs.tag_name }}." | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY

  release-notification:
    name: Release Notification
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      always() &&
      needs.release.outputs.should_release == 'true' &&
      needs.release.outputs.merged_pr_number != ''
    steps:
      - name: Comment release result on merged PR
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ needs.release.outputs.merged_pr_number }}
          PR_TITLE: ${{ needs.release.outputs.merged_pr_title }}
          TAG_NAME: ${{ needs.release.outputs.tag_name }}
          RELEASE_TITLE: ${{ needs.release.outputs.release_title }}
          RELEASE_RESULT: ${{ needs.release.result }}
          TRUSTED_DEVELOPERS: ${{ vars.TRUSTED_DEVELOPERS || '[]' }}
        run: |
          # 该评论仅用于通知，不负责触发后续 workflow，因此使用当前 github.token 即可。
          marker="<!-- workflow:release-result:${{ github.run_id }}:${{ github.run_attempt }} -->"
          if [ "$RELEASE_RESULT" = "success" ]; then
            title="## Release 已完成"
            result="Release 创建成功"
            release_url="https://github.com/$GH_REPO/releases/tag/$TAG_NAME"
          else
            title="## Release 未完成"
            result="Release 创建失败"
            release_url="未生成"
          fi

          mentions="$(printf '%s' "${TRUSTED_DEVELOPERS:-[]}" | jq -r 'if type == "array" then map(select(type == "string" and length > 0) | "@" + .) | unique | join("；") else "" end' 2>/dev/null || true)"
          [ -z "$mentions" ] && mentions="（未配置通知对象）"

          body="$(cat <<EOF
          $marker
          $title

          - 运行结果：**$result**
          - PR 链接：#$PR_NUMBER
          - PR 标题：**$PR_TITLE**
          - 版本标签：**$TAG_NAME**
          - 发布标题：**$RELEASE_TITLE**
          - Release 链接：$release_url
          - 工作流运行：https://github.com/$GH_REPO/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}
          - 通知对象：$mentions

          > 本通知由 GitHub Actions 自动发布。
          EOF
          )"

          gh api --method POST \
            -H "Accept: application/vnd.github+json" \
            "repos/$GH_REPO/issues/$PR_NUMBER/comments" \
            -f body="$body"
