# 维护 PR 可见标签与隐藏分类元数据。
# area:* / kind:* 只写入 PR body 的 HTML 注释，不作为 GitHub 可见标签展示。
name: PR Classification

run-name: "PR Classification #${{ github.event.pull_request.number || inputs.pr_number }} / ${{ github.event.pull_request.head.sha || inputs.head_sha || github.sha }}"

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review, edited]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to classify.
        required: true
      head_sha:
        description: Pull request head SHA expected by the matrix.
        required: false

concurrency:
  group: pr-classification-${{ github.event.pull_request.number || inputs.pr_number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  classify:
    name: Classify Pull Request
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Create classification app token
        id: classification-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.WORKFLOW_AUTOMATION_APP_CLIENT_ID }}
          private-key: ${{ secrets.WORKFLOW_AUTOMATION_APP_PRIVATE_KEY }}
          permission-contents: read
          permission-issues: write
          permission-pull-requests: write

      - name: Checkout trusted base
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.base.sha || github.event.repository.default_branch }}
          token: ${{ steps.classification-token.outputs.token }}
          persist-credentials: false

      - name: Apply visible labels and hidden metadata
        env:
          GH_TOKEN: ${{ steps.classification-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: node .github/scripts/pr-classification.js
