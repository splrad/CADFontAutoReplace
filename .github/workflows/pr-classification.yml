# 维护 PR 可见标签与隐藏分类元数据。
# area:* / kind:* 只写入 PR body 的 HTML 注释，不作为 GitHub 可见标签展示。
name: PR Classification

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review, edited]

concurrency:
  group: pr-classification-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  classify:
    name: Classify Pull Request
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout trusted base
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Apply visible labels and hidden metadata
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node .github/scripts/pr-classification.js
