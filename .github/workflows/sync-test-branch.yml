# 📋 复用到新项目时的配置步骤：
#   1. 在仓库中创建以下 Secrets（路径：设置 → 机密与变量 → 操作 → 新建仓库机密）：
#      - MY_PAT：GitHub 个人访问令牌（需要 repo 权限，用于推送受保护分支）
#   2. 确保仓库已创建 TRUSTED_DEVELOPERS 变量（JSON 数组格式的用户名列表）
#   3. 在 test 分支的规则集中将「仓库管理员」角色添加到旁路列表
#      （路径：设置 → 规则 → 规则集 → 选择 test 分支规则 → 旁路列表 → 添加旁路 → 勾选「仓库管理员」）
#   4. 修改下方 env 中的 TEST_BRANCH 和 MAIN_BRANCH 为实际分支名
#   5. 当 main 分支发生 push（含强制推送）或核心开发者跳过 test 分支直接向 main 合并 PR 后，test 分支将自动同步至 main 最新提交
#   6. PR 关闭状态通知（已合并/未合并）由独立工作流处理，当前文件仅负责分支同步
name: 🔄 重置测试分支到主分支

on:
  workflow_call:

concurrency:
  group: sync-test-branch
  cancel-in-progress: true

env:
  TEST_BRANCH: test
  MAIN_BRANCH: main

jobs:
  sync-test-to-main:
    # ✅ 在 PR 检查列表显示的名称
    name: 🔄 同步测试分支至主分支最新提交
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # 在 main push（含强制推送）时执行；或在快速通道 PR 被核心开发者合并时执行
    if: >-
      github.event_name == 'push' ||
      (
        github.event_name == 'pull_request_target' &&
        github.event.pull_request.merged == true &&
        github.event.pull_request.head.ref != 'test' &&
        contains(fromJSON(vars.TRUSTED_DEVELOPERS), github.event.pull_request.user.login)
      )

    permissions:
      contents: write

    steps:
      - name: 📦 执行代码检出
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.MAIN_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.MY_PAT }}

      - name: 🔄 将测试分支重置为主分支最新提交
        env:
          GH_TOKEN: ${{ secrets.MY_PAT }}
        run: |
          MAIN_SHA=$(git rev-parse HEAD)
          echo "📋 主支最新提交: $MAIN_SHA"

          # 通过 GitHub API 强制更新 test 分支引用，绕过 git push 限制
          gh api --method PATCH "repos/${{ github.repository }}/git/refs/heads/$TEST_BRANCH" \
            -f sha="$MAIN_SHA" \
            -F force=true
          echo "✅ 已将 $TEST_BRANCH 分支重置为 $MAIN_BRANCH 的最新提交 ($MAIN_SHA)"
