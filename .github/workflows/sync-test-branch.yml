# 📋 复用到新项目时的配置步骤：
#   1. 在仓库中创建以下 Secrets（路径：设置 → 机密与变量 → 操作 → 新建仓库机密）：
#      - MY_PAT：GitHub 个人访问令牌（需要 repo 权限，用于推送受保护分支）
#   2. 确保仓库已创建 TRUSTED_DEVELOPERS 变量（JSON 数组格式的用户名列表）
#   3. 在 test 分支的规则集中将「仓库管理员」角色添加到旁路列表
#      （路径：设置 → 规则 → 规则集 → 选择 test 分支规则 → 旁路列表 → 添加旁路 → 勾选「仓库管理员」）
#   4. 修改下方 env 中的 TEST_BRANCH 和 MAIN_BRANCH 为实际分支名
#   5. 当 main 分支发生 push（含强制推送）或核心开发者跳过 test 分支直接向 main 合并 PR 后，test 分支将自动同步至 main 最新提交
#   6. 当 test 分支成功合并到 main 时，将在 PR 下自动发布通知评论并 @ 核心成员，触发 GitHub 官方通知邮件
name: 🔄 重置测试分支到主分支

on:
  push:
    branches:
      - main
  pull_request_target:
    branches:
      - main
    types: [closed]

concurrency:
  group: sync-test-branch
  cancel-in-progress: true

env:
  TEST_BRANCH: test
  MAIN_BRANCH: main

jobs:
  sync-test-to-main:
    # ✅ 在 PR 检查列表显示的名称
    name: 🔄 同步测试分支至主分支最新提交
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # 在 main push（含强制推送）时执行；或在快速通道 PR 被核心开发者合并时执行
    if: >-
      github.event_name == 'push' ||
      (
        github.event_name == 'pull_request_target' &&
        github.event.pull_request.merged == true &&
        github.event.pull_request.head.ref != 'test' &&
        contains(fromJSON(vars.TRUSTED_DEVELOPERS), github.event.pull_request.user.login)
      )

    permissions:
      contents: write

    steps:
      - name: 📦 执行代码检出
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.MAIN_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.MY_PAT }}

      - name: 🔄 将测试分支重置为主分支最新提交
        env:
          GH_TOKEN: ${{ secrets.MY_PAT }}
        run: |
          MAIN_SHA=$(git rev-parse HEAD)
          echo "📋 主支最新提交: $MAIN_SHA"

          # 通过 GitHub API 强制更新 test 分支引用，绕过 git push 限制
          gh api --method PATCH "repos/${{ github.repository }}/git/refs/heads/$TEST_BRANCH" \
            -f sha="$MAIN_SHA" \
            -F force=true
          echo "✅ 已将 $TEST_BRANCH 分支重置为 $MAIN_BRANCH 的最新提交 ($MAIN_SHA)"

  notify-test-merge-success:
    name: 📣 通知 test 合并主分支成功
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.ref == 'test' &&
      github.event.pull_request.base.ref == 'main'

    permissions:
      issues: write
      pull-requests: read

    steps:
      - name: 📣 发布 test 合并 main 成功通知（触发 GitHub 官方通知）
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        env:
          TRUSTED_DEVELOPERS: ${{ vars.TRUSTED_DEVELOPERS }}
        with:
          script: |
            const marker = '<!-- sync-test-branch-status:test-to-main-merged -->';
            const pr = context.payload.pull_request;
            const issueNumber = pr.number;

            let trustedDevelopers = [];
            try {
              trustedDevelopers = JSON.parse(process.env.TRUSTED_DEVELOPERS || '[]');
            } catch (error) {
              core.warning(`TRUSTED_DEVELOPERS 解析失败：${error.message}`);
            }

            const mentionText = trustedDevelopers.length > 0
              ? trustedDevelopers.map(user => `@${user}`).join(' ')
              : '_未配置核心成员，无法发送 @ 通知_';

            const trustedList = trustedDevelopers.length > 0
              ? trustedDevelopers.map(user => `- @${user}`).join('\n')
              : '- （空）';

            const body = [
              marker,
              '## ✅ 主干分支更新通知',
              '',
              `- PR: #${pr.number}`,
              `- 合并人: @${pr.merged_by?.login || 'unknown'}`,
              `- 合并提交: ${pr.merge_commit_sha || 'N/A'}`,
              '',
              '### 🔔 通知对象',
              mentionText,
              '',
              '### 👥 核心成员名单',
              trustedList,
              '',
              '> 本通知由 **GitHub Actions** 自动发布。'
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 100
            });

            const existing = comments.find(comment =>
              typeof comment.body === 'string' && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
              core.info('已更新 test->main 合并成功通知评论。');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body
              });
              core.info('已创建 test->main 合并成功通知评论。');
            }
