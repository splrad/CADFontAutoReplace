# 📋 复用到新项目时的配置步骤：
#   1. 在仓库中创建以下 Secrets（路径：设置 → 机密与变量 → 操作 → 新建仓库机密）：
#      - MY_PAT：GitHub 个人访问令牌（需要 repo 权限，用于推送受保护分支）
#   2. 确保仓库已创建 TRUSTED_DEVELOPERS 变量（JSON 数组格式的用户名列表）
#   3. 在 test 分支的规则集中将「仓库管理员」角色添加到旁路列表
#      （路径：设置 → 规则 → 规则集 → 选择 test 分支规则 → 旁路列表 → 添加旁路 → 勾选「仓库管理员」）
#   4. 修改下方 env 中的 TEST_BRANCH 和 MAIN_BRANCH 为实际分支名
#   5. 当 main 分支发生 push（含强制推送）或核心开发者跳过 test 分支直接向 main 合并 PR 后，test 分支将自动同步至 main 最新提交
#   6. 当 test 分支成功合并到 main 时，将通过后台通知流程触发核心成员官方通知，状态评论不展示通知对象
name: 🔄 重置测试分支到主分支

on:
  push:
    branches:
      - main
  pull_request_target:
    branches:
      - main
    types: [closed]

concurrency:
  group: sync-test-branch
  cancel-in-progress: true

env:
  TEST_BRANCH: test
  MAIN_BRANCH: main

jobs:
  sync-test-to-main:
    # ✅ 在 PR 检查列表显示的名称
    name: 🔄 同步测试分支至主分支最新提交
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # 在 main push（含强制推送）时执行；或在快速通道 PR 被核心开发者合并时执行
    if: >-
      github.event_name == 'push' ||
      (
        github.event_name == 'pull_request_target' &&
        github.event.pull_request.merged == true &&
        github.event.pull_request.head.ref != 'test' &&
        contains(fromJSON(vars.TRUSTED_DEVELOPERS), github.event.pull_request.user.login)
      )

    permissions:
      contents: write

    steps:
      - name: 📦 执行代码检出
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.MAIN_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.MY_PAT }}

      - name: 🔄 将测试分支重置为主分支最新提交
        env:
          GH_TOKEN: ${{ secrets.MY_PAT }}
        run: |
          MAIN_SHA=$(git rev-parse HEAD)
          echo "📋 主支最新提交: $MAIN_SHA"

          # 通过 GitHub API 强制更新 test 分支引用，绕过 git push 限制
          gh api --method PATCH "repos/${{ github.repository }}/git/refs/heads/$TEST_BRANCH" \
            -f sha="$MAIN_SHA" \
            -F force=true
          echo "✅ 已将 $TEST_BRANCH 分支重置为 $MAIN_BRANCH 的最新提交 ($MAIN_SHA)"

  notify-test-merge-success:
    name: 📣 通知 test 合并主分支成功
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.ref == 'test' &&
      github.event.pull_request.base.ref == 'main'

    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: 📣 发布 test 合并 main 成功通知（触发 GitHub 官方通知）
        env:
          GH_TOKEN: ${{ secrets.PR_PAT || secrets.MY_PAT || github.token }}
          TRUSTED_DEVELOPERS: ${{ vars.TRUSTED_DEVELOPERS }}
          ISSUE_NUMBER: ${{ github.event.pull_request.number }}
          MERGED_BY: ${{ github.event.pull_request.merged_by.login }}
          MERGE_COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          REPO: ${{ github.repository }}
        run: |
          marker='<!-- sync-test-branch-status:test-to-main-merged -->'
          notify_sent_marker='<!-- sync-test-branch-notify-sent -->'
          notify_ping_marker='<!-- sync-test-branch-hidden-notify-ping -->'

          issue_number="${ISSUE_NUMBER:-0}"
          if [ "$issue_number" = "0" ]; then
            echo "未获取到 PR 编号，跳过通知。"
            exit 0
          fi

          trusted_json=$(printf '%s' "${TRUSTED_DEVELOPERS:-[]}" | jq -c 'if type == "array" then map(select(type == "string" and length > 0)) else [] end' 2>/dev/null || echo '[]')

          comments_json=$(gh api --method GET \
            -H "Accept: application/vnd.github+json" \
            "repos/$REPO/issues/$issue_number/comments" \
            -f per_page=100)

          existing_id=$(echo "$comments_json" | jq -r --arg marker "$marker" '.[] | select((.body // "") | contains($marker)) | .id' | head -n 1)
          existing_body=$(echo "$comments_json" | jq -r --arg marker "$marker" '.[] | select((.body // "") | contains($marker)) | .body' | head -n 1)

          notify_sent="false"
          notify_status='状态未变化，未重复触发通知。'
          if printf '%s' "$existing_body" | grep -Fq "$notify_sent_marker"; then
            notify_sent="true"
            notify_status='已发送，无需重复通知。'
          fi

          if [ "$notify_sent" != "true" ]; then
            reviewers_json=$(echo "$trusted_json" | jq -c 'unique | .[:15]')
            reviewer_count=$(echo "$reviewers_json" | jq 'length')

            if [ "$reviewer_count" -eq 0 ]; then
              notify_sent="false"
              notify_status='未配置核心成员名单，未触发通知。'
            else
              req_payload=$(jq -nc --argjson reviewers "$reviewers_json" '{reviewers: $reviewers}')
              if request_output=$(gh api --method POST \
                -H "Accept: application/vnd.github+json" \
                "repos/$REPO/pulls/$issue_number/requested_reviewers" \
                --input - <<< "$req_payload" 2>&1); then
                notify_sent="true"
                notify_status='已通过请求评审触发核心成员通知（评论不展示对象）。'
              elif printf '%s' "$request_output" | grep -q '422'; then
                mention_text=$(echo "$reviewers_json" | jq -r 'map("@" + .) | join(" ")')
                ping_body=$(printf '%s\n%s\n' "$notify_ping_marker" "$mention_text")

                ping_id=$(gh api --method POST \
                  -H "Accept: application/vnd.github+json" \
                  "repos/$REPO/issues/$issue_number/comments" \
                  -f body="$ping_body" \
                  --jq '.id')

                if ! gh api --method DELETE \
                  -H "Accept: application/vnd.github+json" \
                  "repos/$REPO/issues/comments/$ping_id" >/dev/null 2>&1; then
                  echo "::warning::删除后台通知临时评论失败（comment_id=$ping_id）。"
                fi

                notify_sent="true"
                notify_status='已通过后台通知流程触发核心成员通知（评论不展示对象）。'
              else
                echo "::warning::触发核心成员通知失败：$request_output"
                notify_sent="false"
                notify_status='触发通知失败，请检查权限或核心成员配置。'
              fi
            fi
          fi

          merged_by="${MERGED_BY:-unknown}"
          merge_commit_sha="${MERGE_COMMIT_SHA:-N/A}"
          body_file="$RUNNER_TEMP/sync_test_merge_notice_body.txt"

          {
            echo "$marker"
            if [ "$notify_sent" = "true" ]; then
              echo "$notify_sent_marker"
            fi
            echo '## ✅ 主干分支更新通知'
            echo
            echo "- PR: #$issue_number"
            echo "- 合并人: $merged_by"
            echo "- 合并提交: $merge_commit_sha"
            echo
            echo '### 🔔 通知状态'
            echo "$notify_status"
            echo
            echo '> 本通知由 **GitHub Actions** 自动发布。'
          } > "$body_file"

          body=$(cat "$body_file")

          if [ -n "$existing_id" ] && [ "$existing_id" != "null" ]; then
            gh api --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "repos/$REPO/issues/comments/$existing_id" \
              -f body="$body" >/dev/null
            echo '已更新 test->main 合并成功通知评论。'
          else
            gh api --method POST \
              -H "Accept: application/vnd.github+json" \
              "repos/$REPO/issues/$issue_number/comments" \
              -f body="$body" >/dev/null
            echo '已创建 test->main 合并成功通知评论。'
          fi
