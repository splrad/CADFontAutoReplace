# 📋 复用到新项目时的配置步骤：
#   1) 创建并安装一个中立命名的 GitHub App，例如 `Workflow Automation`。
#      该 App 至少需要仓库权限：Contents 读写、Pull requests 读写、Issues 读写。
#      当前 workflow 用 actions/create-github-app-token 生成短期 installation token，
#      不使用个人 PAT，也不使用 GitHub App 的 client secret。
#   2) 在仓库 Variables 中配置：
#      - WORKFLOW_AUTOMATION_APP_CLIENT_ID：GitHub App 页面显示的 Client ID，不是 App ID。
#      - TRUSTED_DEVELOPERS：可选 JSON 数组，仅用于自动通知对象；不再影响目标分支选择。
#   3) 在仓库 Secrets 中配置：
#      - WORKFLOW_AUTOMATION_APP_PRIVATE_KEY：GitHub App private key 的 .pem 完整内容。
#      - COPILOT_CLI_TOKEN：可选；用于 Copilot CLI 生成 PR 标题/摘要。
#        未配置时仍会使用代码差异兜底标题和摘要，不会回退为“来源分支 -> 目标分支”。
#   4) 默认普通人工非 main 分支都会自动创建或更新指向 main 的 PR。
#      bot actor（*[bot]）由对应机器人自己的 PR 流程管理，
#      PR Automation 不参与，避免 bot 上下文缺少 App private key secret 时产生阻断红叉。
#      如新项目使用其他主分支名称，修改 Resolve target branch 步骤中的目标分支规则，
#      并同步修改 PR Governance、PR Cleanup 和分支保护 required checks。
#   5) 保留 .github/pull_request_template.md 中的 workflow:auto-summary 标记。
#      workflow 只覆盖该自动区块，人工补充内容会保留。
#   6) 保留 PR Classification workflow。
#      它维护无前缀可见 PR 标签，并把 area:* / kind:* 写入隐藏分类元数据。
#   7) 保留 .github/release.yml 中的软件发布分类配置。
#      PR Automation 只补运行代码变化的 release notes label。
#   8) Copilot CLI 只用于生成中文 PR 标题和摘要；失败时使用确定性中文兜底。
#   9) 合并本次 main-only 分支模型迁移后，更新远端 ruleset：
#      从 main-protection 移除 Source Branch Gate required check；
#      停用或删除 test-protection；确认没有 test 目标 PR 后再删除远端 test 分支。
#   10) 验证建议：推送一个人工 feature 分支，确认自动创建/更新 main 目标 PR，且标题来自代码内容。
name: PR Automation

on:
  # 所有分支 push 后统一进入自动建 PR 逻辑。
  # main 和 bot actor 在 job.if 中排除。
  push:
    branches:
      - '**'

concurrency:
  group: pr-automation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  # 内置 github.token 只用于最小只读权限；PR 创建和新建成功通知使用 GitHub App token。
  contents: read

jobs:
  create-or-update-pr:
    name: Create or Update Pull Request
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      github.ref_name != 'main' &&
      !endsWith(github.actor, '[bot]')

    env:
      # SOURCE_BRANCH 由 push ref 自动得到，跨仓库复用通常无需修改。
      SOURCE_BRANCH: ${{ github.ref_name }}
      # COPILOT_CLI_TOKEN 可选；为空时跳过 Copilot CLI 并走确定性兜底。
      COPILOT_CLI_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}

    steps:
      - name: Create automation app token
        id: automation-token
        uses: actions/create-github-app-token@v3
        with:
          # 使用 Client ID + private key 换取短期 installation token。
          # 这里不要填写 App ID，也不要填写 client secret。
          client-id: ${{ vars.WORKFLOW_AUTOMATION_APP_CLIENT_ID }}
          private-key: ${{ secrets.WORKFLOW_AUTOMATION_APP_PRIVATE_KEY }}
          # PR 创建/更新需要 pull-requests: write；新建成功通知和 release notes label 需要 issues: write；
          # checkout 和 diff 分析需要 contents: read。
          permission-contents: read
          permission-pull-requests: write
          permission-issues: write

      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ steps.automation-token.outputs.token }}

      - name: Resolve target branch
        shell: bash
        run: |
          # 默认分支流转规则：
          # - any non-main branch -> main
          # 复用到其他项目时，如果主分支名称不是 main，只改这一段即可。
          target_branch="main"

          echo "TARGET_BRANCH=$target_branch" >> "$GITHUB_ENV"
          echo "Resolved PR flow: ${SOURCE_BRANCH} -> $target_branch"

      - name: Build PR summary context
        id: context
        env:
          # 使用 GitHub App token 创建/更新 PR，避免 github.token 触发的事件不再触发后续 workflow。
          GH_TOKEN: ${{ steps.automation-token.outputs.token }}
          GH_COMMENT_TOKEN: ${{ steps.automation-token.outputs.token }}
        run: node .github/scripts/pr-automation.js generate

      - name: Set up Node.js for Copilot CLI
        if: env.SKIP_PR_AUTOMATION != 'true' && env.COPILOT_CLI_TOKEN != ''
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Copilot CLI
        if: env.SKIP_PR_AUTOMATION != 'true' && env.COPILOT_CLI_TOKEN != ''
        run: npm install -g @github/copilot

      - name: Generate PR title and summary with Copilot CLI
        if: env.SKIP_PR_AUTOMATION != 'true' && env.COPILOT_CLI_TOKEN != ''
        continue-on-error: true
        env:
          # Copilot CLI 读取 COPILOT_GITHUB_TOKEN；这里映射仓库 secret COPILOT_CLI_TOKEN。
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}
        shell: bash
        run: |
          output_path="$RUNNER_TEMP/workflow-pr-copilot-output.txt"
          copilot -p "$(cat "$PR_COPILOT_PROMPT_PATH")" --allow-tool='shell(git:*)' --no-ask-user > "$output_path"
          echo "PR_COPILOT_OUTPUT_PATH=$output_path" >> "$GITHUB_ENV"

      - name: Apply PR title, body, and notification
        if: env.SKIP_PR_AUTOMATION != 'true'
        id: apply
        env:
          # 该步骤会创建或更新 PR、写入自动摘要区块；只有新建 PR 时写成功通知评论。
          GH_TOKEN: ${{ steps.automation-token.outputs.token }}
          GH_COMMENT_TOKEN: ${{ steps.automation-token.outputs.token }}
          TRUSTED_DEVELOPERS: ${{ vars.TRUSTED_DEVELOPERS || '[]' }}
        run: node .github/scripts/pr-automation.js apply
