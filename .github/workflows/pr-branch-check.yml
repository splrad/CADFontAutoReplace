name: 🔒 代码变更分支策略与合并准入机制

on:
  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened]

jobs:
  # ❗ ID 保持英文，方便系统识别和状态检查关联
  branch-policy-check:
    # ✅ 在 PR 检查列表显示的名称：专业且具有威慑力
    name: ⚙️ 分支策略与合并准入检查
    runs-on: ubuntu-latest
    # 授予写入权限，以便 Action 可以发表评论和修改标签
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: 🔍 执行分支来源与流向校验
        id: check
        env:
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          CUR_REPO: ${{ github.repository }}
        # 使用 bash 变量处理，防止 Shell 注入攻击
        run: |
          echo "Checking merge request: $HEAD_REPO:$HEAD_REF -> $CUR_REPO:$BASE_REF"
          
          if [ "$HEAD_REPO" != "$CUR_REPO" ]; then
            echo "error_msg=❌ 错误：禁止从外部 Fork 仓库直接向 master 提交 PR。" >> $GITHUB_ENV
            exit 1
          fi
          
          if [ "$HEAD_REF" != "test" ]; then
            echo "error_msg=❌ 合并被拒绝：仅允许 test 分支向 master 发起变更合并请求。当前来源分支为: $HEAD_REF" >> $GITHUB_ENV
            exit 1
          fi
          
          echo "✅ 验证通过：符合工作流规范。"

      - name: 💬 执行违规合并自动反馈
        # 仅在上述步骤失败时运行
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const errorMsg = process.env.error_msg || "❌ 分支检查失败：请确保来源分支为 `test`。";
            const commentBody = `### 🤖 流程自动检查失败\n\n${errorMsg}\n\n**操作指引：**\n1. 请关闭此 Pull Request。\n2. 确保代码已合并至 \`test\` 分支并完成测试。\n3. 从 \`test\` 分支发起新的 PR 指向 \`master\`。`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            })