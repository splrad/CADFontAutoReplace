# 📋 复用到新项目时的配置步骤：
#   1. 在 main 分支保护规则中勾选「Require a pull request before merging」，
#      禁止任何人直接推送到主分支，所有变更必须通过 PR 合入
#   2. 推送本文件后，在 Actions 页面手动运行一次本工作流（workflow_dispatch），
#      使「⚙️ 主干合并来源校验」注册到 GitHub
#   3. 在 main 分支保护规则中将「⚙️ 主干合并来源校验」添加为必须通过的状态检查
#   4. 修改下方 env 中的 ALLOWED_SOURCE_BRANCH 为允许向主分支合并的来源分支名
#   5. 修改 on.pull_request_target.branches 为实际的主分支名（master 或 main）
#   6. （可选）配置完成后删除 workflow_dispatch 触发器和 register-checks Job
name: 🔒 主支合并规则校验

on:
  pull_request_target:
    branches:
      - main
    types: [opened, synchronize, reopened]
  # ⚡ 临时触发：推送后手动运行一次，让 GitHub 识别状态检查名称，
  #    以便在分支保护规则中添加为必须通过的检查。配置完成后可删除此触发器。
  workflow_dispatch:

concurrency:
  group: pr-branch-check-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  ALLOWED_SOURCE_BRANCH: test

jobs:
  # ────────────────────────────────────────────────────────
  # ⚡ 临时 Job：手动触发时让状态检查名称注册到 GitHub
  #    配置完分支保护规则后，可连同 workflow_dispatch 一起删除
  # ────────────────────────────────────────────────────────
  register-checks:
    if: github.event_name == 'workflow_dispatch'
    name: ⚙️ 主干合并来源校验
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - run: echo "✅ 状态检查「⚙️ 主干合并来源校验」已注册，可在分支保护规则中选取。"

  # ❗ ID 保持英文，方便系统识别和状态检查关联
  branch-policy-check:
    # ✅ 在 PR 检查列表显示的名称
    name: ⚙️ 主干合并来源校验
    runs-on: ubuntu-latest
    # 设置合理的超时时间，防止长时间占用资源
    timeout-minutes: 5
    # 授予写入权限，以便 Action 可以发表评论和修改标签
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: 🔍 执行分支来源与流向校验
        id: check
        env:
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          CUR_REPO: ${{ github.repository }}
        # 使用 bash 变量处理，防止 Shell 注入攻击
        run: |
          echo "Checking merge request: $HEAD_REPO:$HEAD_REF -> $CUR_REPO:$BASE_REF"
          
          if [ "$HEAD_REPO" != "$CUR_REPO" ]; then
            echo "error_msg=❌ 错误：禁止从外部 Fork 仓库直接向 $BASE_REF 提交 PR。" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          
          if [ "$HEAD_REF" != "$ALLOWED_SOURCE_BRANCH" ]; then
            echo "error_msg=❌ 合并被拒绝：仅允许 $ALLOWED_SOURCE_BRANCH 分支向 $BASE_REF 发起变更合并请求。当前来源分支为: $HEAD_REF" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          
          echo "✅ 验证通过：符合工作流规范。"

      - name: 💬 执行违规合并自动反馈
        # 仅在上述步骤失败时运行
        if: failure()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        env:
          ERROR_MSG: ${{ steps.check.outputs.error_msg }}
        with:
          script: |
            const errorMsg = process.env.ERROR_MSG || `❌ 分支检查失败：请确保来源分支为 \`${process.env.ALLOWED_SOURCE_BRANCH}\`。`;
            const allowedBranch = process.env.ALLOWED_SOURCE_BRANCH;
            const baseBranch = context.payload.pull_request.base.ref;
            const commentBody = `### 🤖 流程自动检查失败\n\n${errorMsg}\n\n**操作指引：**\n1. 请关闭此 Pull Request。\n2. 确保代码已合并至 \`${allowedBranch}\` 分支并完成测试。\n3. 从 \`${allowedBranch}\` 分支发起新的 PR 指向 \`${baseBranch}\`。`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            })