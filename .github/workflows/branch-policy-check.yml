# 📋 复用到新项目时的配置步骤：
#   1. 在 main 分支保护规则中勾选「Require a pull request before merging」，
#      禁止任何人直接推送到主分支，所有变更必须通过 PR 合入
#   2. 在 main 分支保护规则中将「🛡️ PR检查 / 🧩 主干准入 / ⚙️ 来源限制」添加为必须通过的状态检查
#   3. 修改下方 env 中的 ALLOWED_SOURCE_BRANCH 为允许向主分支合并的来源分支名
#   4. 如需限制触发分支，请在编排工作流中配置 pull_request_target.branches（建议在 orchestrate-pr-events.yml 中维护）
#   5. 核心开发者（TRUSTED_DEVELOPERS 变量中的用户）发起的 PR 将自动放行来源限制
name: 🔒 主干分支合并规则校验

on:
  workflow_call:

concurrency:
  group: pr-branch-check-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  ALLOWED_SOURCE_BRANCH: test

jobs:
  # ❗ ID 保持英文，方便系统识别和状态检查关联
  branch-policy-check:
    # ✅ 在 PR 检查列表显示的名称
    name: ⚙️ 来源限制
    runs-on: ubuntu-latest
    # 设置合理的超时时间，防止长时间占用资源
    timeout-minutes: 5
    # 授予写入权限，以便 Action 可以发表评论和修改标签
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: 🔍 执行分支来源与流向校验
        id: check
        env:
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          CUR_REPO: ${{ github.repository }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          TRUSTED_LIST: ${{ vars.TRUSTED_DEVELOPERS }}
        # 使用 bash 变量处理，防止 Shell 注入攻击
        run: |
          echo "Checking merge request: $HEAD_REPO:$HEAD_REF -> $CUR_REPO:$BASE_REF"
          
          if [ "$HEAD_REPO" != "$CUR_REPO" ]; then
            echo "error_msg=❌ 错误：禁止从外部 Fork 仓库直接向 $BASE_REF 提交 PR。" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          
          if [ "$HEAD_REF" != "$ALLOWED_SOURCE_BRANCH" ]; then
            # 核心开发者允许从任意分支直接向主分支发起 PR（快速通道）
            IS_TRUSTED=$(echo "$TRUSTED_LIST" | jq -r --arg actor "$PR_AUTHOR" \
              'if . == null then "false" elif (. | index($actor)) then "true" else "false" end')
            
            if [ "$IS_TRUSTED" = "true" ]; then
              echo "✅ 核心开发者 $PR_AUTHOR 快速通道放行：允许 $HEAD_REF 直接向 $BASE_REF 合并。"
            else
              echo "error_msg=❌ 合并被拒绝：仅允许 $ALLOWED_SOURCE_BRANCH 分支向 $BASE_REF 发起变更合并请求。当前来源分支为: $HEAD_REF" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          fi
          
          echo "✅ 验证通过：符合工作流规范。"

      - name: 💬 执行违规合并自动反馈
        # 仅在上述步骤失败时运行
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN || secrets.MY_PAT || github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          REPO: ${{ github.repository }}
          ERROR_MSG: ${{ steps.check.outputs.error_msg }}
        run: |
          ERROR_MSG_TEXT="${ERROR_MSG:-❌ 分支检查失败：请确保来源分支为 \`$ALLOWED_SOURCE_BRANCH\`。}"

          COMMENT_BODY=$(printf '%s\n' \
            '### 🤖 流程自动检查失败' \
            '' \
            "$ERROR_MSG_TEXT" \
            '' \
            '**操作指引：**' \
            '1. 请关闭此 Pull Request。' \
            "2. 确保代码已合并至 \`$ALLOWED_SOURCE_BRANCH\` 分支并完成测试。" \
            "3. 从 \`$ALLOWED_SOURCE_BRANCH\` 分支发起新的 PR 指向 \`$BASE_BRANCH\`。")

          gh api --method POST \
            -H "Accept: application/vnd.github+json" \
            "repos/$REPO/issues/$PR_NUMBER/comments" \
            -f body="$COMMENT_BODY" >/dev/null