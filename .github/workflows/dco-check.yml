# 非阻断 DCO Signed-off-by 提示。
# 该 workflow 只帮助贡献者按 DCO 习惯补充 commit trailer，不应加入 required checks。
name: DCO Sign-off Advisory

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: dco-signoff-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  dco-signoff-advisory:
    name: DCO Sign-off Advisory
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout trusted advisory script
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - name: Check commit sign-offs
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node .github/scripts/dco-check.js
