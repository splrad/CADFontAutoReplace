changed-files-labels-limit: 6
max-files-changed: 200

"area:runtime":
  - changed-files:
      - any-glob-to-any-file:
          - "src/**"
          - "tools/Publish-ReleaseAssets.ps1"
          - "Directory.Build.props"
          - "Directory.Packages.props"
          - "global.json"
          - "chore/Fonts.zip"

"area:release":
  - changed-files:
      - any-glob-to-any-file:
          - "Version.props"
          - "tools/Publish-ReleaseAssets.ps1"
          - ".github/release.yml"
          - ".github/workflows/release-build.yml"
          - ".github/scripts/generate-release-notes.ps1"
          - "chore/Fonts.zip"

"area:workflow":
  - changed-files:
      - any-glob-to-any-file:
          - ".github/workflows/**"

"area:automation":
  - changed-files:
      - any-glob-to-any-file:
          - ".github/scripts/**"
          - ".github/actions/**"
          - ".github/labeler.yml"
          - ".github/dependabot.yml"
          - ".github/copilot-instructions.md"
          - ".github/instructions/**"
          - ".github/pull_request_template.md"

"area:docs":
  - changed-files:
      - any-glob-to-any-file:
          - "README.md"
          - "docs/**"

"area:config":
  - changed-files:
      - any-glob-to-any-file:
          - ".editorconfig"
          - ".gitattributes"
          - ".gitignore"
          - "*.slnx"
          - "*.props"
          - "global.json"
