# GitHub 官方自动发布说明配置。
# 复用到新项目时优先保留这份文件，再按项目实际 label 体系调整 labels。
# 规则说明：
#   - GitHub releases/generate-notes 会按 PR label 归类到下面的 categories。
#   - 同一个 PR 命中多个分类时，通常按 categories 顺序进入最先匹配的分类。
#   - 只保留运行代码、安装器、发布包相关分类；纯 workflow/docs/chore 不进入发布说明。
#   - PR Classification 的 area:* / kind:* 是隐藏分类元数据，不作为可见标签或发布说明分类依据。
#   - PR Automation 和 PR Classification 只会为运行代码变化自动补充下面这些 release labels。
changelog:
  exclude:
    labels:
      - ignore-for-release
      - skip-changelog
      - no-changelog
      - no-release-notes
  categories:
    - title: 破坏性变更
      labels:
        - breaking-change
        - breaking
        - semver-major
    - title: 安全修复
      labels:
        - security
        - vulnerability
    - title: 新增功能
      labels:
        - feature
        - feat
        - enhancement
        - semver-minor
    - title: 问题修复
      labels:
        - bug
        - fix
        - bugfix
        - regression
    - title: 性能优化
      labels:
        - performance
        - perf
    - title: 安装与发布包
      labels:
        - build
    - title: 其他插件变更
      labels:
        - plugin
        - runtime
